<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Videos</title>
  <meta id="metaDescription" name="description" content="Watch videos from FIRECATCHER404.">
  <meta id="themeColor" name="theme-color" content="#f7f7f2">
  <meta id="ogTitle" property="og:title" content="Videos">
  <meta id="ogDescription" property="og:description" content="Watch videos from FIRECATCHER404.">
  <meta id="ogType" property="og:type" content="website">
  <meta id="ogUrl" property="og:url" content="https://firecatcher404.github.io/videos/">
  <meta id="ogImage" property="og:image" content="https://firecatcher404.github.io/videos/preview.svg">
  <meta property="og:image:type" content="image/svg+xml">
  <meta property="og:image:width" content="1200">
  <meta property="og:image:height" content="630">
  <meta property="og:site_name" content="FIRECATCHER404">
  <meta id="twitterTitle" name="twitter:title" content="Videos">
  <meta id="twitterDescription" name="twitter:description" content="Watch videos from FIRECATCHER404.">
  <meta id="twitterImage" name="twitter:image" content="https://firecatcher404.github.io/videos/preview.svg">
  <meta name="twitter:card" content="summary_large_image">
  <script>
    (() => {
      try {
        const storedTheme = localStorage.getItem("videos-theme");
        const validThemes = new Set(["light", "dark", "midnight"]);
        const prefersDark = window.matchMedia("(prefers-color-scheme: dark)").matches;
        document.documentElement.dataset.theme = validThemes.has(storedTheme) ? storedTheme : (prefersDark ? "dark" : "light");
      } catch {
        document.documentElement.dataset.theme = "light";
      }
    })();
  </script>
  <style>
    :root {
      color-scheme: light;
      --bg: #f7f7f2;
      --panel: #ffffff;
      --panel-soft: #efeee6;
      --text: #171714;
      --ink: #171714;
      --muted: #65645f;
      --line: #d7d4c8;
      --accent: #116b5f;
      --accent-strong: #0b4e45;
      --accent-text: #ffffff;
      --danger: #ad3029;
      --logo-bg: #f04e37;
      --logo-play: #ffffff;
      --poster-bg: #151513;
      --empty-line: #8c897e;
      --page-glow: rgba(17,107,95,0.11);
      --page-sheen: rgba(255,255,255,0.54);
      --soft-fill: rgba(255,255,255,0.64);
      --empty-fill: rgba(255,255,255,0.42);
      --shadow: 0 12px 28px rgba(28, 26, 18, 0.12);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    html[data-theme="dark"] {
      color-scheme: dark;
      --bg: #151715;
      --panel: #20231f;
      --panel-soft: #2a3029;
      --text: #edf4ea;
      --ink: #edf4ea;
      --muted: #aeb9aa;
      --line: #414a3f;
      --accent: #21c96b;
      --accent-strong: #60e995;
      --accent-text: #05140b;
      --danger: #ff8177;
      --logo-bg: #21c96b;
      --logo-play: #05140b;
      --poster-bg: #080a08;
      --empty-line: #5a6658;
      --page-glow: rgba(33,201,107,0.13);
      --page-sheen: rgba(255,255,255,0.04);
      --soft-fill: rgba(255,255,255,0.08);
      --empty-fill: rgba(255,255,255,0.05);
      --shadow: 0 14px 30px rgba(0, 0, 0, 0.38);
    }

    html[data-theme="midnight"] {
      color-scheme: dark;
      --bg: #000000;
      --panel: #060b0d;
      --panel-soft: #0b171b;
      --text: #e8fdff;
      --ink: #b7faff;
      --muted: #8bbcc1;
      --line: #17464d;
      --accent: #00eaff;
      --accent-strong: #73f6ff;
      --accent-text: #001013;
      --danger: #ff5d8f;
      --logo-bg: #00eaff;
      --logo-play: #001013;
      --poster-bg: #010303;
      --empty-line: #1b5c66;
      --page-glow: rgba(0,234,255,0.16);
      --page-sheen: rgba(0,234,255,0.045);
      --soft-fill: rgba(0,234,255,0.07);
      --empty-fill: rgba(0,234,255,0.045);
      --shadow: 0 16px 34px rgba(0, 234, 255, 0.10);
    }

    * {
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      margin: 0;
      background:
        linear-gradient(180deg, var(--page-sheen), rgba(255,255,255,0)),
        radial-gradient(circle at top left, var(--page-glow), transparent 30rem),
        var(--bg);
      color: var(--text);
    }

    a {
      color: inherit;
    }

    button,
    input {
      font: inherit;
    }

    .app-shell {
      width: min(1180px, calc(100% - 32px));
      margin: 0 auto;
      padding: 24px 0 48px;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 12px 0 22px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      min-width: 0;
      color: inherit;
      text-decoration: none;
    }

    .brand-mark {
      width: 46px;
      height: 46px;
      flex: 0 0 auto;
      transition: transform 0.12s ease;
    }

    .brand:hover .brand-mark {
      transform: translateY(-1px);
    }

    .logo-shadow {
      fill: var(--ink);
    }

    .logo-body {
      fill: var(--logo-bg);
      stroke: var(--ink);
      stroke-width: 2.5;
    }

    .logo-play {
      fill: var(--logo-play);
    }

    .logo-lines {
      stroke: var(--ink);
      stroke-linecap: round;
      stroke-width: 2.5;
    }

    .brand h1 {
      margin: 0;
      font-size: clamp(1.5rem, 4vw, 2.35rem);
      letter-spacing: 0;
      line-height: 1;
    }

    .repo-pill {
      display: inline-flex;
      align-items: center;
      max-width: 100%;
      min-height: 28px;
      padding: 4px 8px;
      margin-top: 7px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: var(--soft-fill);
      color: var(--muted);
      font-size: 0.85rem;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .toolbar {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 8px;
      flex-wrap: wrap;
    }

    .icon-button,
    .text-button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 38px;
      border: 1px solid var(--ink);
      border-radius: 7px;
      background: var(--panel);
      color: var(--text);
      cursor: pointer;
      box-shadow: 2px 2px 0 var(--ink);
      transition: transform 0.12s ease, box-shadow 0.12s ease, background 0.12s ease;
    }

    .icon-button {
      width: 40px;
      padding: 0;
    }

    .text-button {
      gap: 8px;
      padding: 0 12px;
      text-decoration: none;
      white-space: nowrap;
    }

    .icon-button:hover,
    .text-button:hover {
      background: var(--panel-soft);
      transform: translate(-1px, -1px);
      box-shadow: 3px 3px 0 var(--ink);
    }

    .icon-button:active,
    .text-button:active {
      transform: translate(1px, 1px);
      box-shadow: 1px 1px 0 var(--ink);
    }

    .theme-sun,
    .theme-moon,
    .theme-midnight {
      display: none;
    }

    html[data-theme="light"] .theme-sun,
    html[data-theme="dark"] .theme-moon,
    html[data-theme="midnight"] .theme-midnight {
      display: block;
    }

    .icon {
      width: 18px;
      height: 18px;
      fill: currentColor;
      flex: 0 0 auto;
    }

    .search-row {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 12px;
      margin: 4px 0 22px;
    }

    .library-controls {
      display: grid;
      gap: 12px;
      margin: 4px 0 22px;
    }

    .library-controls .search-row {
      margin: 0;
    }

    .section-tabs {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .section-tab[aria-selected="true"] {
      background: var(--accent);
      color: var(--accent-text);
      box-shadow: 3px 3px 0 var(--ink);
    }

    .like-button[aria-pressed="true"] {
      background: var(--accent);
      color: var(--accent-text);
    }

    .search-wrap {
      position: relative;
    }

    .search-wrap .icon {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--muted);
      pointer-events: none;
    }

    .search-input {
      width: 100%;
      height: 44px;
      padding: 0 14px 0 42px;
      border: 1px solid var(--ink);
      border-radius: 8px;
      background: var(--panel);
      color: var(--text);
      outline: none;
      box-shadow: 3px 3px 0 var(--ink);
    }

    .search-input:focus {
      border-color: var(--accent);
      box-shadow: 3px 3px 0 var(--accent);
    }

    .status {
      min-height: 26px;
      margin-bottom: 14px;
      color: var(--muted);
      font-size: 0.94rem;
    }

    .status.error {
      color: var(--danger);
    }

    .home-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 16px;
      align-items: stretch;
    }

    .home-card {
      display: flex;
      flex-direction: column;
      gap: 14px;
      min-width: 0;
      min-height: 260px;
      border: 1px solid var(--ink);
      border-radius: 8px;
      background: var(--panel);
      padding: 14px;
      box-shadow: var(--shadow);
    }

    .home-section-button {
      width: 100%;
      min-height: 44px;
      background: var(--accent);
      color: var(--accent-text);
      font-weight: 750;
      box-shadow: 3px 3px 0 var(--ink);
    }

    .home-section-button:hover {
      background: var(--accent-strong);
    }

    .home-latest {
      display: grid;
      gap: 12px;
      min-width: 0;
      color: inherit;
      text-decoration: none;
    }

    .home-latest-poster {
      aspect-ratio: 16 / 9;
      border: 1px solid var(--line);
      border-radius: 7px;
      background: var(--poster-bg);
      overflow: hidden;
    }

    .home-latest-poster img,
    .home-latest-poster video {
      width: 100%;
      height: 100%;
      display: block;
      object-fit: cover;
      background: var(--poster-bg);
    }

    .home-card[data-section="shorts"] .home-latest-poster {
      aspect-ratio: 9 / 16;
      max-height: 260px;
      width: min(100%, 150px);
      justify-self: center;
    }

    .home-latest-title {
      margin: 0;
      overflow-wrap: anywhere;
      font-size: 1rem;
      line-height: 1.3;
      letter-spacing: 0;
    }

    .home-latest-meta,
    .home-empty {
      margin: 0;
      color: var(--muted);
      font-size: 0.88rem;
      line-height: 1.4;
    }

    .video-grid,
    .post-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 16px;
      align-items: stretch;
    }

    .video-card,
    .post-card {
      display: flex;
      flex-direction: column;
      min-height: 100%;
      border: 1px solid var(--ink);
      border-radius: 8px;
      background: var(--panel);
      color: inherit;
      overflow: hidden;
      text-decoration: none;
      box-shadow: var(--shadow);
      transition: transform 0.14s ease, box-shadow 0.14s ease;
    }

    .video-card:hover,
    .post-card:hover {
      transform: translateY(-3px);
      box-shadow: 0 18px 34px rgba(28, 26, 18, 0.16);
    }

    .short-card .poster {
      aspect-ratio: 9 / 16;
    }

    .post-card {
      min-height: 220px;
      padding: 16px;
    }

    .post-card .card-body {
      padding: 0;
    }

    .poster {
      position: relative;
      aspect-ratio: 16 / 9;
      background: var(--poster-bg);
      overflow: hidden;
    }

    .poster video,
    .poster img {
      width: 100%;
      height: 100%;
      display: block;
      object-fit: cover;
      background: var(--poster-bg);
    }

    .poster-fallback {
      display: grid;
      width: 100%;
      height: 100%;
      place-items: center;
      color: #fff;
      font-size: 0.95rem;
      font-weight: 700;
    }

    .card-body {
      display: flex;
      flex: 1;
      flex-direction: column;
      gap: 10px;
      padding: 13px 14px 14px;
    }

    .card-title {
      display: -webkit-box;
      min-height: 2.7em;
      margin: 0;
      overflow: hidden;
      font-size: 1.05rem;
      line-height: 1.35;
      letter-spacing: 0;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
    }

    .card-description {
      display: -webkit-box;
      min-height: 2.8em;
      margin: 0;
      overflow: hidden;
      color: var(--muted);
      font-size: 0.92rem;
      line-height: 1.4;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
    }

    .meta-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      margin-top: auto;
      color: var(--muted);
      font-size: 0.82rem;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      min-height: 24px;
      padding: 3px 7px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: var(--panel-soft);
      color: var(--muted);
      font-size: 0.78rem;
      line-height: 1;
      white-space: nowrap;
    }

    .empty-state {
      display: grid;
      min-height: 280px;
      place-items: center;
      border: 1px dashed var(--empty-line);
      border-radius: 8px;
      background: var(--empty-fill);
      color: var(--muted);
      text-align: center;
      padding: 24px;
    }

    .watch-view {
      display: grid;
      grid-template-columns: minmax(0, 1fr) minmax(280px, 360px);
      gap: 18px;
      align-items: start;
    }

    .player-panel {
      min-width: 0;
    }

    .player {
      width: 100%;
      aspect-ratio: 16 / 9;
      display: block;
      border: 1px solid var(--ink);
      border-radius: 8px;
      background: #000;
      box-shadow: var(--shadow);
    }

    .player-controls {
      display: grid;
      grid-template-columns: auto auto minmax(0, 1fr) auto;
      gap: 10px;
      align-items: center;
      margin-top: 10px;
      border: 1px solid var(--ink);
      border-radius: 8px;
      background: var(--panel);
      padding: 10px;
      box-shadow: var(--shadow);
    }

    .time-display {
      min-width: 46px;
      color: var(--muted);
      font-size: 0.86rem;
      font-variant-numeric: tabular-nums;
      text-align: center;
    }

    .timeline-wrap {
      position: relative;
      min-width: 0;
    }

    .segment-markers {
      position: absolute;
      inset: 4px 8px auto 8px;
      height: 8px;
      pointer-events: none;
    }

    .segment-marker {
      position: absolute;
      top: 0;
      width: 2px;
      height: 8px;
      border-radius: 999px;
      background: var(--accent);
      opacity: 0.9;
    }

    .chapter-marker {
      background: var(--danger);
      opacity: 0.8;
    }

    .timeline {
      width: 100%;
      margin: 0;
      accent-color: var(--accent);
      cursor: pointer;
    }

    .watch-details {
      min-width: 0;
      border: 1px solid var(--ink);
      border-radius: 8px;
      background: var(--panel);
      padding: 16px;
      box-shadow: var(--shadow);
    }

    .watch-details h2 {
      margin: 0 0 10px;
      font-size: 1.35rem;
      line-height: 1.2;
      letter-spacing: 0;
      overflow-wrap: anywhere;
    }

    .watch-details p {
      color: var(--muted);
      line-height: 1.5;
      white-space: pre-wrap;
      overflow-wrap: anywhere;
    }

    .detail-list {
      display: grid;
      gap: 8px;
      margin: 16px 0;
      color: var(--muted);
      font-size: 0.9rem;
    }

    .detail-list div {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      border-bottom: 1px solid var(--line);
      padding-bottom: 7px;
    }

    .detail-list strong {
      color: var(--text);
      font-weight: 650;
    }

    .actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-top: 14px;
    }

    .chapters-panel,
    .comments-panel,
    .post-panel {
      margin-top: 18px;
      border: 1px solid var(--ink);
      border-radius: 8px;
      background: var(--panel);
      padding: 16px;
      box-shadow: var(--shadow);
    }

    .chapters-panel h3,
    .comments-panel h3,
    .post-panel h2 {
      margin: 0 0 12px;
      font-size: 1rem;
      letter-spacing: 0;
    }

    .chapter-list {
      display: grid;
      gap: 8px;
    }

    .chapter-button {
      justify-content: space-between;
      width: 100%;
      min-height: 34px;
      box-shadow: none;
    }

    .post-body {
      color: var(--text);
      line-height: 1.55;
      white-space: pre-wrap;
      overflow-wrap: anywhere;
    }

    .comments-panel .utterances {
      max-width: 100%;
    }

    .comments-fallback {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 12px;
      color: var(--muted);
      font-size: 0.9rem;
      line-height: 1.45;
    }

    .comments-fallback p {
      margin: 0;
    }

    .config-warning {
      border: 1px solid var(--ink);
      border-left: 8px solid var(--danger);
      border-radius: 8px;
      background: var(--panel);
      box-shadow: var(--shadow);
      padding: 18px;
    }

    .config-warning h2 {
      margin: 0 0 8px;
      font-size: 1.2rem;
    }

    .config-warning code {
      padding: 2px 5px;
      border-radius: 5px;
      background: var(--panel-soft);
    }

    @media (max-width: 760px) {
      .app-shell {
        width: min(100% - 20px, 1180px);
        padding-top: 12px;
      }

      .topbar {
        align-items: flex-start;
        flex-direction: column;
      }

      .toolbar {
        width: 100%;
        justify-content: flex-start;
      }

      .search-row {
        grid-template-columns: 1fr;
      }

      .home-grid {
        grid-template-columns: 1fr;
      }

      .watch-view {
        grid-template-columns: 1fr;
      }
    }

    @media (min-width: 761px) and (max-width: 1040px) {
      .home-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
    }
  </style>
</head>
<body>
  <main class="app-shell">
    <header class="topbar">
      <a class="brand" href="./" data-home-link aria-label="Videos home">
        <svg class="brand-mark" viewBox="0 0 64 64" aria-hidden="true">
          <rect class="logo-shadow" x="11" y="13" width="44" height="40" rx="8"></rect>
          <rect class="logo-body" x="7" y="9" width="44" height="40" rx="8"></rect>
          <path class="logo-play" d="M26 21.5v15l13-7.5-13-7.5z"></path>
          <path class="logo-lines" d="M16 18h8M16 40h19"></path>
        </svg>
        <div>
          <h1>Videos</h1>
          <div id="repoLabel" class="repo-pill">Loading repository</div>
        </div>
      </a>
      <nav class="toolbar" aria-label="Page controls">
        <button id="backButton" class="icon-button" type="button" title="Back to home" hidden aria-label="Back to home">
          <svg class="icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.42-1.41L7.83 13H20v-2z"/></svg>
        </button>
        <button id="refreshButton" class="icon-button" type="button" title="Refresh videos" aria-label="Refresh videos">
          <svg class="icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M17.65 6.35A7.95 7.95 0 0 0 12 4a8 8 0 1 0 7.45 5.08h-2.13A6 6 0 1 1 12 6c1.66 0 3.14.69 4.22 1.78L13 11h8V3l-3.35 3.35z"/></svg>
        </button>
        <button id="themeButton" class="icon-button" type="button" title="Switch theme" aria-label="Switch theme">
          <svg class="icon theme-sun" viewBox="0 0 24 24" aria-hidden="true"><path d="M6.76 4.84l-1.8-1.79-1.41 1.41 1.79 1.8 1.42-1.42zM1 13h3v-2H1v2zm10-12h2v3h-2V1zm8.04 2.46l1.41 1.41-1.79 1.8-1.42-1.42 1.8-1.79zM17.24 19.16l1.8 1.79 1.41-1.41-1.79-1.8-1.42 1.42zM20 11v2h3v-2h-3zM11 20h2v3h-2v-3zm-7.45-.46l1.41 1.41 1.8-1.79-1.42-1.42-1.79 1.8zM12 6a6 6 0 1 0 0 12A6 6 0 0 0 12 6zm0 2a4 4 0 1 1 0 8 4 4 0 0 1 0-8z"/></svg>
          <svg class="icon theme-moon" viewBox="0 0 24 24" aria-hidden="true"><path d="M20.6 15.49A8.03 8.03 0 0 1 8.51 3.4 8.56 8.56 0 1 0 20.6 15.49z"/></svg>
          <svg class="icon theme-midnight" viewBox="0 0 24 24" aria-hidden="true"><path d="M12 2l1.55 5.11L19 5.5l-3.88 4.07L20 12l-4.88 2.43L19 18.5l-5.45-1.61L12 22l-1.55-5.11L5 18.5l3.88-4.07L4 12l4.88-2.43L5 5.5l5.45 1.61L12 2z"/></svg>
        </button>
      </nav>
    </header>

    <section id="libraryControls" class="library-controls" hidden>
      <div class="search-row">
        <label class="search-wrap">
          <svg class="icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M9.5 3a6.5 6.5 0 0 1 5.17 10.44l4.44 4.45-1.42 1.41-4.44-4.44A6.5 6.5 0 1 1 9.5 3zm0 2a4.5 4.5 0 1 0 0 9 4.5 4.5 0 0 0 0-9z"/></svg>
          <input id="searchInput" class="search-input" type="search" placeholder="Search videos" autocomplete="off">
        </label>
        <button id="clearSearchButton" class="text-button" type="button">Clear</button>
      </div>
    </section>

    <div id="status" class="status" role="status"></div>
    <section id="content"></section>
  </main>

  <script>
    /*
      Change these repository values before publishing a fork of this page.
      The uploader creates release tags like: selftube/v1/my-video-id/public
      Hidden videos are unlisted only. Anyone who can read the public GitHub
      releases or knows the direct URL can still access them.
      Discord and similar crawlers do not run this JavaScript, so per-video
      Open Graph tags need generated static pages or a server if you need
      previews that show each video's exact title/thumbnail.
    */
    const SELFTUBE_CONFIG = {
      owner: "FIRECATCHER404",
      repo: "videos",
      tagPrefix: "selftube/v1/",
      githubApiBase: "https://api.github.com",
      siteBaseUrl: "https://firecatcher404.github.io/videos/",
      defaultPreviewImage: "https://firecatcher404.github.io/videos/preview.svg",
      commentsRepo: "FIRECATCHER404/videos"
    };

    const VIDEO_EXTENSIONS = new Set(["mp4", "webm", "mov", "m4v", "ogv", "ogg"]);
    const IMAGE_EXTENSIONS = new Set(["jpg", "jpeg", "png", "webp", "gif"]);
    const CAPTION_EXTENSIONS = new Set(["vtt"]);
    const SECTION_TYPES = {
      videos: "video",
      shorts: "short",
      playlists: "playlist",
      posts: "post"
    };
    const SECTION_LABELS = {
      videos: "Videos",
      shorts: "Shorts",
      playlists: "Playlists",
      posts: "Posts"
    };
    const SECTION_ORDER = ["videos", "shorts", "playlists", "posts"];
    const THEME_SEQUENCE = ["light", "dark", "midnight"];
    const THEME_LABELS = {
      light: "light",
      dark: "dark",
      midnight: "midnight"
    };
    const THEME_COLORS = {
      light: "#f7f7f2",
      dark: "#151715",
      midnight: "#000000"
    };
    const THEME_STORAGE_KEY = "videos-theme";
    const LIKE_COUNTS_STORAGE_KEY = "videos-local-like-counts-v1";
    const LIKED_COOKIE_NAME = "videos_liked_items";
    const RELEASES_CACHE_VERSION = 1;
    const RELEASES_CACHE_TTL_MS = 10 * 60 * 1000;
    const RELEASES_CACHE_MAX_AGE_MS = 7 * 24 * 60 * 60 * 1000;

    const state = {
      allItems: [],
      visibleItems: [],
      activeItem: null,
      activeSection: "videos",
      loading: false
    };

    const elements = {
      repoLabel: document.getElementById("repoLabel"),
      status: document.getElementById("status"),
      content: document.getElementById("content"),
      searchInput: document.getElementById("searchInput"),
      clearSearchButton: document.getElementById("clearSearchButton"),
      refreshButton: document.getElementById("refreshButton"),
      themeButton: document.getElementById("themeButton"),
      backButton: document.getElementById("backButton"),
      libraryControls: document.getElementById("libraryControls"),
      sectionTabs: [...document.querySelectorAll(".section-tab")]
    };

    function isConfigured() {
      return Boolean(
        SELFTUBE_CONFIG.owner &&
        SELFTUBE_CONFIG.repo &&
        !SELFTUBE_CONFIG.owner.includes("YOUR_") &&
        !SELFTUBE_CONFIG.repo.includes("YOUR_")
      );
    }

    function escapeHtml(value) {
      return String(value ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function currentTheme() {
      const theme = document.documentElement.dataset.theme;
      return THEME_SEQUENCE.includes(theme) ? theme : "light";
    }

    function utterancesTheme() {
      return currentTheme() === "light" ? "github-light" : "github-dark";
    }

    function setMetaContent(id, value) {
      const element = document.getElementById(id);
      if (element) element.setAttribute("content", value);
    }

    function removeDynamicVideoMeta() {
      document.querySelectorAll("meta[data-video-meta]").forEach((element) => element.remove());
    }

    function addDynamicVideoMeta(property, value) {
      if (!value) return;
      const element = document.createElement("meta");
      element.dataset.videoMeta = "true";
      element.setAttribute("property", property);
      element.setAttribute("content", value);
      document.head.append(element);
    }

    function absoluteVideoUrl(id) {
      const url = new URL(SELFTUBE_CONFIG.siteBaseUrl, window.location.href);
      url.search = "";
      url.searchParams.set("video", id);
      return url.href;
    }

    function absoluteItemUrl(item) {
      const url = new URL(SELFTUBE_CONFIG.siteBaseUrl, window.location.href);
      url.search = "";
      url.searchParams.set(queryKeyForType(item.type), item.id);
      return url.href;
    }

    function shareCardUrl(id) {
      return new URL(`watch/${encodeURIComponent(id)}/`, SELFTUBE_CONFIG.siteBaseUrl).href;
    }

    function issueTerm(item) {
      const type = item.type === "post" || item.type === "playlist" ? item.type : "video";
      return `${type}:${item.id}`;
    }

    function commentsIssueUrl(itemOrId) {
      const term = typeof itemOrId === "string" ? `video:${itemOrId}` : issueTerm(itemOrId);
      const params = new URLSearchParams({
        q: `repo:${SELFTUBE_CONFIG.commentsRepo} ${term} in:title`
      });
      return `https://github.com/${SELFTUBE_CONFIG.commentsRepo}/issues?${params.toString()}`;
    }

    async function copyText(value) {
      if (navigator.clipboard && window.isSecureContext) {
        await navigator.clipboard.writeText(value);
        return;
      }

      const textArea = document.createElement("textarea");
      textArea.value = value;
      textArea.setAttribute("readonly", "");
      textArea.style.position = "fixed";
      textArea.style.left = "-9999px";
      document.body.append(textArea);
      textArea.select();
      document.execCommand("copy");
      textArea.remove();
    }

    async function copyShareUrl(button) {
      const url = button.dataset.copyUrl;
      if (!url) return;
      const originalText = button.textContent;
      try {
        await copyText(url);
        button.textContent = "Copied";
      } catch {
        button.textContent = "Copy failed";
      } finally {
        window.setTimeout(() => {
          button.textContent = originalText;
        }, 1400);
      }
    }

    function readCookie(name) {
      const prefix = `${name}=`;
      return document.cookie
        .split(";")
        .map((item) => item.trim())
        .find((item) => item.startsWith(prefix))
        ?.slice(prefix.length) || "";
    }

    function writeCookie(name, value) {
      document.cookie = `${name}=${value}; max-age=31536000; path=/; SameSite=Lax`;
    }

    function likeKey(item) {
      return `${item.type || "video"}:${item.id}`;
    }

    function readLikedKeys() {
      try {
        const raw = readCookie(LIKED_COOKIE_NAME);
        const parsed = raw ? JSON.parse(decodeURIComponent(raw)) : [];
        return new Set(Array.isArray(parsed) ? parsed.map(String) : []);
      } catch {
        return new Set();
      }
    }

    function writeLikedKeys(keys) {
      writeCookie(LIKED_COOKIE_NAME, encodeURIComponent(JSON.stringify([...keys])));
    }

    function readLikeCounts() {
      try {
        const parsed = JSON.parse(localStorage.getItem(LIKE_COUNTS_STORAGE_KEY) || "{}");
        return parsed && typeof parsed === "object" ? parsed : {};
      } catch {
        return {};
      }
    }

    function writeLikeCounts(counts) {
      try {
        localStorage.setItem(LIKE_COUNTS_STORAGE_KEY, JSON.stringify(counts));
      } catch {
        // The button still changes visually even if storage is unavailable.
      }
    }

    function localLikeState(item) {
      const key = likeKey(item);
      const likedKeys = readLikedKeys();
      const liked = likedKeys.has(key);
      const counts = readLikeCounts();
      const savedCount = Math.max(0, Number(counts[key]) || 0);
      return { key, liked, count: liked ? Math.max(1, savedCount) : savedCount };
    }

    function likeButtonText(liked, count) {
      return `${liked ? "Liked" : "Like"} ${count}`;
    }

    function renderLikeButton(item) {
      const state = localLikeState(item);
      return `<button id="likeButton" class="text-button like-button" type="button" data-like-key="${escapeHtml(state.key)}" aria-pressed="${state.liked ? "true" : "false"}">${escapeHtml(likeButtonText(state.liked, state.count))}</button>`;
    }

    function setupLocalLikeButtons() {
      document.querySelectorAll("[data-like-key]").forEach((button) => {
        button.addEventListener("click", () => {
          const key = button.dataset.likeKey;
          if (!key) return;
          const likedKeys = readLikedKeys();
          const counts = readLikeCounts();
          const wasLiked = likedKeys.has(key);
          let count = Math.max(0, Number(counts[key]) || 0);
          if (wasLiked) {
            likedKeys.delete(key);
            count = Math.max(0, count - 1);
          } else {
            likedKeys.add(key);
            count += 1;
          }
          counts[key] = count;
          writeLikedKeys(likedKeys);
          writeLikeCounts(counts);
          button.setAttribute("aria-pressed", wasLiked ? "false" : "true");
          button.textContent = likeButtonText(!wasLiked, count);
        });
      });
    }

    function applyLibraryMeta() {
      removeDynamicVideoMeta();
      document.title = "Videos";
      setMetaContent("metaDescription", "Watch videos from FIRECATCHER404.");
      setMetaContent("ogTitle", "Videos");
      setMetaContent("ogDescription", "Watch videos from FIRECATCHER404.");
      setMetaContent("ogType", "website");
      setMetaContent("ogUrl", SELFTUBE_CONFIG.siteBaseUrl);
      setMetaContent("ogImage", SELFTUBE_CONFIG.defaultPreviewImage);
      setMetaContent("twitterTitle", "Videos");
      setMetaContent("twitterDescription", "Watch videos from FIRECATCHER404.");
      setMetaContent("twitterImage", SELFTUBE_CONFIG.defaultPreviewImage);
    }

    function applyItemMeta(item) {
      const title = `${item.title} - Videos`;
      const description = item.description || `Open ${item.title} from FIRECATCHER404.`;
      const image = item.thumbnailUrl || SELFTUBE_CONFIG.defaultPreviewImage;
      removeDynamicVideoMeta();
      document.title = title;
      setMetaContent("metaDescription", description);
      setMetaContent("ogTitle", title);
      setMetaContent("ogDescription", description);
      setMetaContent("ogType", item.videoUrl ? "video.other" : "article");
      setMetaContent("ogUrl", absoluteItemUrl(item));
      setMetaContent("ogImage", image);
      setMetaContent("twitterTitle", title);
      setMetaContent("twitterDescription", description);
      setMetaContent("twitterImage", image);
      addDynamicVideoMeta("og:video", item.videoUrl);
      addDynamicVideoMeta("og:video:secure_url", item.videoUrl);
    }

    function applyTheme(theme, persist = false) {
      const normalizedTheme = THEME_SEQUENCE.includes(theme) ? theme : "light";
      document.documentElement.dataset.theme = normalizedTheme;
      setMetaContent("themeColor", THEME_COLORS[normalizedTheme]);
      if (elements.themeButton) {
        const currentIndex = THEME_SEQUENCE.indexOf(normalizedTheme);
        const nextTheme = THEME_SEQUENCE[(currentIndex + 1) % THEME_SEQUENCE.length];
        const nextLabel = THEME_LABELS[nextTheme];
        elements.themeButton.setAttribute("title", `Switch to ${nextLabel} mode`);
        elements.themeButton.setAttribute("aria-label", `Switch to ${nextLabel} mode`);
      }
      if (persist) {
        try {
          localStorage.setItem(THEME_STORAGE_KEY, normalizedTheme);
        } catch {
          // Ignore storage errors so the toggle still works for the current page.
        }
      }
      updateUtterancesTheme();
    }

    function updateUtterancesTheme() {
      const iframe = document.querySelector(".utterances-frame");
      if (!iframe || !iframe.contentWindow) return;
      iframe.contentWindow.postMessage({ type: "set-theme", theme: utterancesTheme() }, "https://utteranc.es");
    }

    function renderComments(item) {
      const comments = document.getElementById("comments");
      if (!comments) return;
      comments.innerHTML = "";

      const script = document.createElement("script");
      script.src = "https://utteranc.es/client.js";
      script.async = true;
      script.crossOrigin = "anonymous";
      script.setAttribute("repo", SELFTUBE_CONFIG.commentsRepo);
      script.setAttribute("issue-term", issueTerm(item));
      script.setAttribute("label", "comments");
      script.setAttribute("theme", utterancesTheme());
      comments.append(script);
    }

    function formatDate(value) {
      if (!value) return "Unknown date";
      const date = new Date(value);
      if (Number.isNaN(date.getTime())) return "Unknown date";
      return date.toLocaleDateString(undefined, { year: "numeric", month: "short", day: "numeric" });
    }

    function formatTime(seconds) {
      const safeSeconds = Math.max(0, Number(seconds) || 0);
      const whole = Math.floor(safeSeconds);
      const hours = Math.floor(whole / 3600);
      const minutes = Math.floor((whole % 3600) / 60);
      const secs = whole % 60;
      if (hours) {
        return `${hours}:${String(minutes).padStart(2, "0")}:${String(secs).padStart(2, "0")}`;
      }
      return `${minutes}:${String(secs).padStart(2, "0")}`;
    }

    function asNumber(value, fallback = 0) {
      const number = Number(value);
      return Number.isFinite(number) ? number : fallback;
    }

    function extensionFromName(name) {
      const match = String(name || "").toLowerCase().match(/\.([a-z0-9]+)$/);
      return match ? match[1] : "";
    }

    function parseSelfTubeTag(tagName) {
      if (!tagName || !tagName.startsWith(SELFTUBE_CONFIG.tagPrefix)) return null;
      const rest = tagName.slice(SELFTUBE_CONFIG.tagPrefix.length);
      const parts = rest.split("/");
      if (![2, 3].includes(parts.length)) return null;
      const id = parts[0].trim();
      const visibility = parts[1].trim().toLowerCase();
      if (!id || !["public", "hidden"].includes(visibility)) return null;
      let segmentIndex = 1;
      let segmentCount = 1;
      if (parts.length === 3) {
        const match = parts[2].match(/^part-(\d+)-of-(\d+)$/);
        if (!match) return null;
        segmentIndex = Number(match[1]);
        segmentCount = Number(match[2]);
        if (!segmentIndex || !segmentCount || segmentIndex > segmentCount) return null;
      }
      return {
        id,
        hidden: visibility === "hidden",
        segmentIndex,
        segmentCount
      };
    }

    function parseEmbeddedMetadata(body) {
      if (!body) return {};
      const match = body.match(/<!--\s*selftube:([\s\S]*?)\s*-->/i);
      if (!match) return {};
      try {
        const parsed = JSON.parse(match[1]);
        return parsed && typeof parsed === "object" ? parsed : {};
      } catch {
        return {};
      }
    }

    function visibleDescription(body) {
      return String(body || "")
        .replace(/<!--\s*selftube:[\s\S]*?\s*-->/i, "")
        .trim();
    }

    function pickAssets(assets) {
      const allAssets = Array.isArray(assets) ? assets : [];
      const videos = allAssets.filter((asset) => {
        const ext = extensionFromName(asset.name);
        const type = String(asset.content_type || "").toLowerCase();
        return VIDEO_EXTENSIONS.has(ext) || type.startsWith("video/");
      });
      const thumbnails = allAssets.filter((asset) => IMAGE_EXTENSIONS.has(extensionFromName(asset.name)));
      const captions = allAssets.filter((asset) => CAPTION_EXTENSIONS.has(extensionFromName(asset.name)));
      return {
        video: videos[0] || null,
        thumbnail: thumbnails[0] || null,
        captions
      };
    }

    function normalizeChapters(chapters) {
      if (!Array.isArray(chapters)) return [];
      return chapters
        .map((chapter) => ({
          start: asNumber(chapter.start, -1),
          title: String(chapter.title || "").trim()
        }))
        .filter((chapter) => chapter.start >= 0 && chapter.title)
        .sort((a, b) => a.start - b.start);
    }

    function normalizePlaylistItems(items) {
      if (!Array.isArray(items)) return [];
      return items.map((item) => String(item).trim()).filter(Boolean);
    }

    function captionsForAssets(metadata, assets) {
      const metadataCaptions = Array.isArray(metadata.captions) ? metadata.captions : [];
      return assets.captions.map((asset, index) => {
        const match = metadataCaptions.find((caption) => caption.assetName === asset.name) || metadataCaptions[index] || {};
        return {
          url: asset.browser_download_url,
          label: String(match.label || asset.name || "Captions"),
          lang: String(match.lang || "en")
        };
      });
    }

    function pagesMediaUrlForPart(id, segmentIndex, segmentCount) {
      const suffix = segmentCount > 1 ? `-part-${String(segmentIndex).padStart(3, "0")}` : "";
      return new URL(`media/${encodeURIComponent(`${id}${suffix}.mp4`)}`, SELFTUBE_CONFIG.siteBaseUrl).href;
    }

    function releaseToContentPart(release) {
      const tagData = parseSelfTubeTag(release.tag_name);
      if (!tagData) return null;
      const metadata = parseEmbeddedMetadata(release.body);
      const assets = pickAssets(release.assets);

      const description = metadata.description || visibleDescription(release.body);
      const title = metadata.title || release.name || tagData.id;
      const type = String(metadata.type || (assets.video ? "video" : "post")).toLowerCase();
      if (!["video", "short", "playlist", "post"].includes(type)) return null;
      if ((type === "video" || type === "short") && !assets.video) return null;
      const segmentIndex = asNumber(metadata.segmentIndex, tagData.segmentIndex);
      const segmentCount = asNumber(metadata.segmentCount, tagData.segmentCount);
      const releaseVideoUrl = assets.video ? assets.video.browser_download_url : "";
      const pagesVideoUrl = releaseVideoUrl ? pagesMediaUrlForPart(metadata.id || tagData.id, segmentIndex, segmentCount) : "";
      const legacyPagesVideoUrl = releaseVideoUrl && segmentCount > 1 && segmentIndex === 1
        ? pagesMediaUrlForPart(metadata.id || tagData.id, 1, 1)
        : "";
      const videoSources = [...new Set([pagesVideoUrl, legacyPagesVideoUrl].filter(Boolean))];

      return {
        id: metadata.id || tagData.id,
        type,
        hidden: typeof metadata.hidden === "boolean" ? metadata.hidden : tagData.hidden,
        title,
        description,
        releaseUrl: release.html_url,
        createdAt: release.published_at || release.created_at,
        updatedAt: release.updated_at,
        scheduledAt: metadata.scheduledAt || "",
        videoUrl: videoSources[0] || "",
        videoSources,
        fallbackVideoUrl: "",
        videoName: assets.video ? assets.video.name : "",
        videoSize: assets.video ? assets.video.size : 0,
        thumbnailUrl: assets.thumbnail ? assets.thumbnail.browser_download_url : "",
        captions: captionsForAssets(metadata, assets),
        chapters: normalizeChapters(metadata.chapters),
        playlistItems: normalizePlaylistItems(metadata.items || metadata.playlistItems),
        tagName: release.tag_name,
        segmentIndex,
        segmentCount,
        segmentStart: asNumber(metadata.segmentStart, (tagData.segmentIndex - 1) * 1200),
        segmentDuration: asNumber(metadata.segmentDuration, 0),
        originalDuration: asNumber(metadata.originalDuration, 0)
      };
    }

    function groupContentParts(parts) {
      const groups = new Map();
      for (const part of parts) {
        if (!groups.has(part.id)) groups.set(part.id, []);
        groups.get(part.id).push(part);
      }

      return [...groups.values()].map((segments) => {
        segments.sort((a, b) => a.segmentIndex - b.segmentIndex);
        const first = segments[0];
        const totalDuration = first.originalDuration || segments.reduce((sum, segment) => sum + (segment.segmentDuration || 0), 0);
        return {
          ...first,
          hidden: first.hidden,
          segmentCount: Math.max(first.segmentCount || 1, segments.length),
          totalDuration,
          segments: segments.map((segment, index) => ({
            ...segment,
            offset: segment.segmentStart || segments.slice(0, index).reduce((sum, item) => sum + (item.segmentDuration || 0), 0)
          }))
        };
      });
    }

    function releasesCacheKey() {
      return [
        "videos-releases-cache",
        RELEASES_CACHE_VERSION,
        SELFTUBE_CONFIG.owner,
        SELFTUBE_CONFIG.repo,
        SELFTUBE_CONFIG.tagPrefix
      ].join(":");
    }

    function compactAssetForCache(asset) {
      return {
        name: asset.name,
        content_type: asset.content_type,
        browser_download_url: asset.browser_download_url,
        size: asset.size
      };
    }

    function compactReleaseForCache(release) {
      return {
        tag_name: release.tag_name,
        name: release.name,
        body: release.body,
        html_url: release.html_url,
        created_at: release.created_at,
        published_at: release.published_at,
        assets: Array.isArray(release.assets) ? release.assets.map(compactAssetForCache) : []
      };
    }

    function readReleasesCache(allowStale = false) {
      try {
        const raw = localStorage.getItem(releasesCacheKey());
        if (!raw) return null;
        const cached = JSON.parse(raw);
        if (!cached || cached.version !== RELEASES_CACHE_VERSION || !Array.isArray(cached.releases)) return null;
        const age = Date.now() - Number(cached.savedAt || 0);
        if (age < 0 || age > RELEASES_CACHE_MAX_AGE_MS) return null;
        if (!allowStale && age > RELEASES_CACHE_TTL_MS) return null;
        return {
          releases: cached.releases,
          age,
          stale: age > RELEASES_CACHE_TTL_MS
        };
      } catch {
        return null;
      }
    }

    function writeReleasesCache(releases) {
      try {
        localStorage.setItem(releasesCacheKey(), JSON.stringify({
          version: RELEASES_CACHE_VERSION,
          savedAt: Date.now(),
          releases: releases.map(compactReleaseForCache)
        }));
      } catch {
        // If browser storage is full or disabled, the site can still use the network.
      }
    }

    async function githubFetch(url) {
      const response = await fetch(url, {
        headers: {
          "Accept": "application/vnd.github+json"
        }
      });

      if (!response.ok) {
        let message = `GitHub returned ${response.status}`;
        try {
          const data = await response.json();
          if (data && data.message) message += `: ${data.message}`;
        } catch {
          message += `: ${response.statusText}`;
        }
        throw new Error(message);
      }

      return response.json();
    }

    async function fetchAllReleasesFromGitHub() {
      const releases = [];
      for (let page = 1; page <= 20; page += 1) {
        const url = `${SELFTUBE_CONFIG.githubApiBase}/repos/${encodeURIComponent(SELFTUBE_CONFIG.owner)}/${encodeURIComponent(SELFTUBE_CONFIG.repo)}/releases?per_page=100&page=${page}`;
        const batch = await githubFetch(url);
        releases.push(...batch);
        if (batch.length < 100) break;
      }
      return releases;
    }

    async function fetchAllReleases(options = {}) {
      if (!options.forceRefresh) {
        const cached = readReleasesCache(false);
        if (cached) {
          return { releases: cached.releases, source: "cache" };
        }
      }

      try {
        const releases = await fetchAllReleasesFromGitHub();
        writeReleasesCache(releases);
        return { releases, source: "network" };
      } catch (error) {
        const cached = readReleasesCache(true);
        if (cached) {
          return {
            releases: cached.releases,
            source: "stale-cache",
            error
          };
        }
        throw error;
      }
    }

    function setStatus(message, isError = false) {
      elements.status.textContent = message || "";
      elements.status.classList.toggle("error", Boolean(isError));
    }

    function setPageMode(mode) {
      const isHome = mode === "home";
      const isSection = mode === "section";
      elements.libraryControls.hidden = !isSection;
      elements.backButton.hidden = isHome;
      if (elements.backButton) {
        elements.backButton.setAttribute("title", "Back to home");
        elements.backButton.setAttribute("aria-label", "Back to home");
      }
    }

    function sectionForType(type) {
      if (type === "short") return "shorts";
      if (type === "playlist") return "playlists";
      if (type === "post") return "posts";
      return "videos";
    }

    function queryKeyForType(type) {
      if (type === "post") return "post";
      if (type === "playlist") return "playlist";
      if (type === "short") return "short";
      return "video";
    }

    function itemLink(item) {
      const url = new URL(window.location.href);
      url.search = "";
      url.searchParams.set(queryKeyForType(item.type), item.id);
      return url.pathname + url.search;
    }

    function isFutureDate(value) {
      if (!value) return false;
      const date = new Date(value);
      return !Number.isNaN(date.getTime()) && date.getTime() > Date.now();
    }

    function isVisibleItem(item) {
      return !item.hidden && !isFutureDate(item.scheduledAt);
    }

    function setActiveSection(section) {
      state.activeSection = SECTION_TYPES[section] ? section : "videos";
      elements.sectionTabs.forEach((button) => {
        button.setAttribute("aria-selected", button.dataset.section === state.activeSection ? "true" : "false");
      });
      elements.searchInput.placeholder = "Search everything";
    }

    function renderConfiguredWarning() {
      setPageMode("home");
      elements.repoLabel.textContent = "Repository not configured";
      elements.content.innerHTML = `
        <section class="config-warning">
          <h2>Set your GitHub repository</h2>
          <p>Edit <code>SELFTUBE_CONFIG</code> near the top of this file's script and set <code>owner</code> and <code>repo</code>.</p>
          <p>This page reads published SelfTube items tagged with <code>${escapeHtml(SELFTUBE_CONFIG.tagPrefix)}&lt;video-id&gt;/public</code> or <code>${escapeHtml(SELFTUBE_CONFIG.tagPrefix)}&lt;video-id&gt;/hidden</code>.</p>
        </section>
      `;
    }

    function sectionUrl(section) {
      const url = new URL(window.location.href);
      url.search = "";
      url.searchParams.set("section", section);
      return url.pathname + url.search;
    }

    function newestVisibleItemForSection(section) {
      const sectionType = SECTION_TYPES[section] || "video";
      return state.allItems
        .filter((item) => item.type === sectionType)
        .filter(isVisibleItem)
        .sort((a, b) => new Date(b.createdAt || 0) - new Date(a.createdAt || 0))[0] || null;
    }

    function postedVerb(item) {
      if (item.type === "post") return "Posted";
      if (item.type === "playlist") return "Created";
      return "Uploaded";
    }

    function renderHomePoster(item, section) {
      if (item.thumbnailUrl) {
        return `<img src="${escapeHtml(item.thumbnailUrl)}" alt="">`;
      }
      if (item.videoUrl) {
        return `<video src="${escapeHtml(item.videoUrl)}#t=0.1" preload="metadata" muted playsinline></video>`;
      }
      return `<div class="poster-fallback">${escapeHtml(SECTION_LABELS[section] || "Item")}</div>`;
    }

    function renderHomeLatest(section, item) {
      if (!item) {
        return `<p class="home-empty">No public ${escapeHtml(SECTION_LABELS[section].toLowerCase())} yet.</p>`;
      }
      return `
        <a class="home-latest" href="${escapeHtml(itemLink(item))}" data-content-id="${escapeHtml(item.id)}">
          <div class="home-latest-poster">
            ${renderHomePoster(item, section)}
          </div>
          <div>
            <h2 class="home-latest-title">${escapeHtml(item.title)}</h2>
            <p class="home-latest-meta">${escapeHtml(postedVerb(item))} ${escapeHtml(formatDate(item.createdAt))}</p>
          </div>
        </a>
      `;
    }

    function renderHome() {
      setPageMode("home");
      applyLibraryMeta();
      state.activeItem = null;
      state.visibleItems = [];
      elements.searchInput.value = "";
      elements.content.innerHTML = `
        <section class="home-grid" aria-label="Videos home">
          ${SECTION_ORDER.map((section) => {
            const latest = newestVisibleItemForSection(section);
            return `
              <article class="home-card" data-section="${escapeHtml(section)}">
                <a class="text-button home-section-button" href="${escapeHtml(sectionUrl(section))}" data-section-link="${escapeHtml(section)}">
                  ${escapeHtml(SECTION_LABELS[section])}
                </a>
                ${renderHomeLatest(section, latest)}
              </article>
            `;
          }).join("")}
        </section>
      `;
    }

    function renderLibrary() {
      setPageMode("section");
      applyLibraryMeta();
      const query = elements.searchInput.value.trim().toLowerCase();
      const sectionType = SECTION_TYPES[state.activeSection] || "video";
      const searchableText = (item) => [
        item.id,
        item.title,
        item.description,
        item.videoName,
        item.type,
        sectionForType(item.type),
        ...(item.playlistItems || [])
      ].join(" ").toLowerCase();
      state.visibleItems = state.allItems
        .filter(isVisibleItem)
        .filter((item) => query || item.type === sectionType)
        .filter((item) => {
          if (!query) return true;
          return searchableText(item).includes(query);
        })
        .sort((a, b) => new Date(b.createdAt || 0) - new Date(a.createdAt || 0));

      if (!state.visibleItems.length) {
        const message = query ? "No matching items." : `No public ${state.activeSection} found.`;
        elements.content.innerHTML = `<div class="empty-state">${escapeHtml(message)}</div>`;
        return;
      }

      const gridClass = !query && sectionType === "post" ? "post-grid" : "video-grid";
      const label = query ? "Search results" : state.activeSection;
      elements.content.innerHTML = `
        <section class="${gridClass}" aria-label="${escapeHtml(label)}">
          ${state.visibleItems.map(renderContentCard).join("")}
        </section>
      `;
    }

    function renderContentCard(item) {
      if (item.type === "post") return renderPostCard(item);
      const poster = item.thumbnailUrl
        ? `<img src="${escapeHtml(item.thumbnailUrl)}" alt="">`
        : item.videoUrl
          ? `<video src="${escapeHtml(item.videoUrl)}#t=0.1" preload="metadata" muted playsinline></video>`
          : `<div class="poster-fallback">Playlist</div>`;
      const cardClass = `video-card ${item.type === "short" ? "short-card" : ""}`;
      const meta = item.type === "playlist" ? `${item.playlistItems.length} item${item.playlistItems.length === 1 ? "" : "s"}` : `Uploaded ${formatDate(item.createdAt)}`;

      return `
        <a class="${cardClass}" href="${escapeHtml(itemLink(item))}" data-content-id="${escapeHtml(item.id)}">
          <div class="poster">
            ${poster || `<div class="poster-fallback">Video</div>`}
          </div>
          <div class="card-body">
            <h2 class="card-title">${escapeHtml(item.title)}</h2>
            <p class="card-description">${escapeHtml(item.description || "No description.")}</p>
            <div class="meta-row">
              <span>${escapeHtml(meta)}</span>
              <span class="badge">${escapeHtml(item.type)}</span>
            </div>
          </div>
        </a>
      `;
    }

    function renderPostCard(item) {
      return `
        <a class="post-card" href="${escapeHtml(itemLink(item))}" data-content-id="${escapeHtml(item.id)}">
          <div class="card-body">
            <h2 class="card-title">${escapeHtml(item.title)}</h2>
            <p class="card-description">${escapeHtml(item.description || "No post body.")}</p>
            <div class="meta-row">
              <span>Posted ${escapeHtml(formatDate(item.createdAt))}</span>
              <span class="badge">post</span>
            </div>
          </div>
        </a>
      `;
    }

    function renderSegmentMarkers(video) {
      if (!video.totalDuration) return "";
      const chapterMarkers = (video.chapters || []).slice(1).map((chapter) => {
        const left = Math.max(0, Math.min(100, (chapter.start / video.totalDuration) * 100));
        return `<span class="segment-marker chapter-marker" style="left:${left}%"></span>`;
      });
      return chapterMarkers.join("");
    }

    function renderTracks(video) {
      return (video.captions || []).map((caption, index) => `
        <track kind="captions" src="${escapeHtml(caption.url)}" srclang="${escapeHtml(caption.lang)}" label="${escapeHtml(caption.label)}"${index === 0 ? " default" : ""}>
      `).join("");
    }

    function renderChapters(video) {
      if (!video.chapters || !video.chapters.length) return "";
      return `
        <section class="chapters-panel" aria-label="Chapters">
          <h3>Chapters</h3>
          <div class="chapter-list">
            ${video.chapters.map((chapter) => `
              <button class="text-button chapter-button" type="button" data-seek="${escapeHtml(chapter.start)}">
                <span>${escapeHtml(chapter.title)}</span>
                <span>${escapeHtml(formatTime(chapter.start))}</span>
              </button>
            `).join("")}
          </div>
        </section>
      `;
    }

    function setupMergedPlayer(video) {
      const media = document.getElementById("videoPlayer");
      const preloader = document.getElementById("preloadPlayer");
      const playButton = document.getElementById("playerPlayButton");
      const timeline = document.getElementById("playerTimeline");
      const currentLabel = document.getElementById("playerCurrentTime");
      const durationLabel = document.getElementById("playerDuration");
      if (!media || !playButton || !timeline || !currentLabel || !durationLabel) return;

      const segments = video.segments && video.segments.length ? video.segments : [video];
      let currentIndex = 0;
      let totalDuration = video.totalDuration || segments.reduce((sum, segment) => sum + (segment.segmentDuration || 0), 0);
      let pendingLocalTime = 0;
      let pendingShouldPlay = false;
      let isScrubbingTimeline = false;
      let lastCommittedSeekTime = null;
      let lastCommittedSeekAt = 0;

      function clampGlobalTime(time) {
        const numericTime = Number.isFinite(time) ? time : 0;
        const upperLimit = totalDuration || numericTime || 0;
        return Math.max(0, Math.min(numericTime, upperLimit));
      }

      function syncDuration() {
        if (!totalDuration && Number.isFinite(media.duration) && media.duration > 0) {
          segments[currentIndex].segmentDuration = media.duration;
          totalDuration = segments.reduce((sum, segment) => sum + (segment.segmentDuration || 0), 0);
        }
        timeline.max = String(totalDuration || 1);
        durationLabel.textContent = formatTime(totalDuration || media.duration || 0);
      }

      function segmentForTime(time) {
        let index = 0;
        for (let i = 0; i < segments.length; i += 1) {
          const segment = segments[i];
          const nextSegment = segments[i + 1];
          if (!nextSegment || time < nextSegment.offset) {
            index = i;
            break;
          }
        }
        return index;
      }

      function globalTime() {
        return (segments[currentIndex].offset || 0) + (media.currentTime || 0);
      }

      function updateDisplay() {
        const time = globalTime();
        if (!isScrubbingTimeline) {
          currentLabel.textContent = formatTime(time);
          timeline.value = String(clampGlobalTime(time));
        }
        playButton.textContent = media.paused ? "Play" : "Pause";
      }

      function updatePreloader() {
        if (!preloader) return;
        const next = segments[currentIndex + 1];
        if (!next || preloader.getAttribute("src") === next.videoUrl) return;
        preloader.src = next.videoUrl;
        preloader.load();
      }

      function loadSegment(index, localTime = 0, shouldPlay = false) {
        currentIndex = Math.max(0, Math.min(index, segments.length - 1));
        pendingLocalTime = localTime;
        pendingShouldPlay = shouldPlay;
        const segment = segments[currentIndex];
        if (media.getAttribute("src") !== segment.videoUrl) {
          media.src = segment.videoUrl;
          media.load();
        }

        const seekWhenReady = () => {
          const duration = Number.isFinite(media.duration) ? media.duration : segment.segmentDuration || localTime;
          media.currentTime = Math.max(0, Math.min(localTime, duration || localTime));
          syncDuration();
          updateDisplay();
          updatePreloader();
          if (shouldPlay) media.play().catch(() => {});
        };

        if (media.readyState >= 1) {
          seekWhenReady();
        } else {
          media.addEventListener("loadedmetadata", seekWhenReady, { once: true });
        }
      }

      function seekGlobal(time) {
        const targetTime = clampGlobalTime(time);
        const targetIndex = segmentForTime(targetTime);
        const localTime = targetTime - (segments[targetIndex].offset || 0);
        const shouldPlay = !media.paused;
        loadSegment(targetIndex, localTime, shouldPlay);
      }

      function previewTimelineSeek(time) {
        const targetTime = clampGlobalTime(time);
        currentLabel.textContent = formatTime(targetTime);
        timeline.value = String(targetTime);
      }

      function commitTimelineSeek(time) {
        const targetTime = clampGlobalTime(time);
        const now = Date.now();
        const isDuplicateCommit = lastCommittedSeekTime !== null
          && Math.abs(targetTime - lastCommittedSeekTime) < 0.02
          && now - lastCommittedSeekAt < 350;
        isScrubbingTimeline = false;
        if (isDuplicateCommit) return;
        lastCommittedSeekTime = targetTime;
        lastCommittedSeekAt = now;
        seekGlobal(targetTime);
      }

      window.selftubeSeekActiveVideo = seekGlobal;

      playButton.addEventListener("click", () => {
        if (media.paused) {
          media.play().catch(() => {});
        } else {
          media.pause();
        }
      });
      timeline.addEventListener("pointerdown", (event) => {
        isScrubbingTimeline = true;
        if (timeline.setPointerCapture) {
          timeline.setPointerCapture(event.pointerId);
        }
      });
      timeline.addEventListener("input", () => {
        const targetTime = Number(timeline.value);
        previewTimelineSeek(targetTime);
        if (!isScrubbingTimeline) {
          commitTimelineSeek(targetTime);
        }
      });
      timeline.addEventListener("change", () => {
        commitTimelineSeek(Number(timeline.value));
      });
      timeline.addEventListener("pointerup", (event) => {
        if (timeline.releasePointerCapture && timeline.hasPointerCapture && timeline.hasPointerCapture(event.pointerId)) {
          timeline.releasePointerCapture(event.pointerId);
        }
        commitTimelineSeek(Number(timeline.value));
      });
      timeline.addEventListener("pointercancel", () => {
        isScrubbingTimeline = false;
        updateDisplay();
      });
      timeline.addEventListener("blur", () => {
        if (isScrubbingTimeline) {
          commitTimelineSeek(Number(timeline.value));
        }
      });
      media.addEventListener("loadedmetadata", syncDuration);
      media.addEventListener("timeupdate", updateDisplay);
      media.addEventListener("play", updateDisplay);
      media.addEventListener("pause", updateDisplay);
      media.addEventListener("error", () => {
        const segment = segments[currentIndex];
        if (!segment) return;
        const sources = segment.videoSources && segment.videoSources.length
          ? segment.videoSources
          : [segment.videoUrl, segment.fallbackVideoUrl].filter(Boolean);
        const currentSource = media.getAttribute("src");
        const currentSourceIndex = sources.indexOf(currentSource);
        const nextSource = sources[currentSourceIndex + 1];
        if (!nextSource) return;
        media.src = nextSource;
        media.load();
      });
      media.addEventListener("ended", () => {
        if (currentIndex < segments.length - 1) {
          loadSegment(currentIndex + 1, 0, true);
        } else {
          updateDisplay();
        }
      });

      loadSegment(0, 0, false);
    }

    function setupChapterButtons() {
      document.querySelectorAll("[data-seek]").forEach((button) => {
        button.addEventListener("click", () => {
          if (typeof window.selftubeSeekActiveVideo === "function") {
            window.selftubeSeekActiveVideo(Number(button.dataset.seek));
          }
        });
      });
    }

    function renderWatch(video) {
      setPageMode("detail");
      state.activeItem = video;
      applyItemMeta(video);
      elements.content.innerHTML = `
        <section class="watch-view">
          <div class="player-panel">
            <video id="videoPlayer" class="player" playsinline poster="${escapeHtml(video.thumbnailUrl)}">
              ${renderTracks(video)}
            </video>
            <video id="preloadPlayer" preload="auto" hidden></video>
            <div class="player-controls">
              <button id="playerPlayButton" class="text-button" type="button">Play</button>
              <span id="playerCurrentTime" class="time-display">0:00</span>
              <div class="timeline-wrap">
                <div class="segment-markers">${renderSegmentMarkers(video)}</div>
                <input id="playerTimeline" class="timeline" type="range" min="0" max="${escapeHtml(video.totalDuration || 1)}" step="0.033" value="0" aria-label="Video timeline">
              </div>
              <span id="playerDuration" class="time-display">${escapeHtml(formatTime(video.totalDuration || 0))}</span>
            </div>
            ${renderChapters(video)}
            <section class="comments-panel" aria-label="Comments">
              <h3>Comments</h3>
              <div class="comments-fallback">
                <p>Embedded comments need the utterances GitHub App installed on ${escapeHtml(SELFTUBE_CONFIG.commentsRepo)}.</p>
                <a class="text-button" href="${escapeHtml(commentsIssueUrl(video))}" target="_blank" rel="noopener">GitHub Comments</a>
              </div>
              <div id="comments"></div>
            </section>
          </div>
          <aside class="watch-details">
            <h2>${escapeHtml(video.title)}</h2>
            <p>${escapeHtml(video.description || "No description.")}</p>
            <div class="detail-list">
              <div><strong>Uploaded</strong><span>${escapeHtml(formatDate(video.createdAt))}</span></div>
              <div><strong>Section</strong><span>${escapeHtml(sectionForType(video.type))}</span></div>
            </div>
            <div class="actions">
              ${renderLikeButton(video)}
              <button class="text-button" type="button" data-copy-url="${escapeHtml(shareCardUrl(video.id))}">Share Card</button>
              <a class="text-button" href="${escapeHtml(video.videoUrl)}" download>Download</a>
            </div>
          </aside>
        </section>
      `;
      setupMergedPlayer(video);
      setupChapterButtons();
      setupLocalLikeButtons();
      renderComments(video);
    }

    function renderPost(item) {
      setPageMode("detail");
      state.activeItem = item;
      applyItemMeta(item);
      elements.content.innerHTML = `
        <article class="post-panel">
          <h2>${escapeHtml(item.title)}</h2>
          <div class="post-body">${escapeHtml(item.description || "No post body.")}</div>
          <div class="detail-list">
            <div><strong>Posted</strong><span>${escapeHtml(formatDate(item.createdAt))}</span></div>
          </div>
          <div class="actions">
            ${renderLikeButton(item)}
          </div>
        </article>
        <section class="comments-panel" aria-label="Comments">
          <h3>Comments</h3>
          <div class="comments-fallback">
            <p>Embedded comments need the utterances GitHub App installed on ${escapeHtml(SELFTUBE_CONFIG.commentsRepo)}.</p>
            <a class="text-button" href="${escapeHtml(commentsIssueUrl(item))}" target="_blank" rel="noopener">GitHub Comments</a>
          </div>
          <div id="comments"></div>
        </section>
      `;
      setupLocalLikeButtons();
      renderComments(item);
    }

    function renderPlaylist(item) {
      setPageMode("detail");
      state.activeItem = item;
      applyItemMeta(item);
      const playlistVideos = item.playlistItems
        .map((id) => state.allItems.find((candidate) => candidate.id === id && (candidate.type === "video" || candidate.type === "short") && isVisibleItem(candidate)))
        .filter(Boolean);
      elements.content.innerHTML = `
        <section class="post-panel">
          <h2>${escapeHtml(item.title)}</h2>
          <div class="post-body">${escapeHtml(item.description || "No description.")}</div>
          <div class="detail-list">
            <div><strong>Items</strong><span>${escapeHtml(String(item.playlistItems.length))}</span></div>
            <div><strong>Created</strong><span>${escapeHtml(formatDate(item.createdAt))}</span></div>
          </div>
          <div class="actions">
            ${renderLikeButton(item)}
          </div>
        </section>
        <section class="video-grid" aria-label="Playlist videos">
          ${playlistVideos.length ? playlistVideos.map(renderContentCard).join("") : `<div class="empty-state">No matching public videos in this playlist.</div>`}
        </section>
        <section class="comments-panel" aria-label="Comments">
          <h3>Comments</h3>
          <div class="comments-fallback">
            <p>Embedded comments need the utterances GitHub App installed on ${escapeHtml(SELFTUBE_CONFIG.commentsRepo)}.</p>
            <a class="text-button" href="${escapeHtml(commentsIssueUrl(item))}" target="_blank" rel="noopener">GitHub Comments</a>
          </div>
          <div id="comments"></div>
        </section>
      `;
      setupLocalLikeButtons();
      renderComments(item);
    }

    function renderNotFound(videoId) {
      setPageMode("detail");
      applyLibraryMeta();
      elements.content.innerHTML = `
        <div class="empty-state">
          Video "${escapeHtml(videoId)}" was not found in this repository.
        </div>
      `;
    }

    async function loadVideos(options = {}) {
      if (!isConfigured()) {
        setStatus("");
        renderConfiguredWarning();
        return;
      }

      state.loading = true;
      setStatus("Loading SelfTube items...");
      elements.repoLabel.textContent = `${SELFTUBE_CONFIG.owner}/${SELFTUBE_CONFIG.repo}`;

      try {
        const result = await fetchAllReleases(options);
        state.allItems = groupContentParts(result.releases
          .map(releaseToContentPart)
          .filter(Boolean));
        state.loading = false;
        route();
        if (result.source === "stale-cache") {
          setStatus(`Showing cached items because GitHub could not load: ${result.error.message}`, true);
        } else {
          setStatus("");
        }
      } catch (error) {
        state.loading = false;
        state.allItems = [];
        elements.content.innerHTML = `<div class="empty-state">Could not load videos.</div>`;
        setStatus(error.message, true);
      }
    }

    function route() {
      const params = new URLSearchParams(window.location.search);
      const section = params.get("section");
      const videoId = params.get("video") || params.get("short");
      const postId = params.get("post");
      const playlistId = params.get("playlist");
      const targetId = videoId || postId || playlistId;
      if (!targetId) {
        if (section) {
          setActiveSection(section);
          renderLibrary();
        } else {
          renderHome();
        }
        return;
      }

      const item = state.allItems.find((candidate) => candidate.id === targetId && isVisibleItem(candidate));
      if (item && (item.type === "video" || item.type === "short")) {
        renderWatch(item);
      } else if (item && item.type === "post") {
        renderPost(item);
      } else if (item && item.type === "playlist") {
        renderPlaylist(item);
      } else {
        renderNotFound(targetId);
      }
    }

    applyTheme(currentTheme());

    elements.searchInput.addEventListener("input", renderLibrary);
    elements.clearSearchButton.addEventListener("click", () => {
      elements.searchInput.value = "";
      renderLibrary();
      elements.searchInput.focus();
    });
    elements.sectionTabs.forEach((button) => {
      button.addEventListener("click", () => {
        setActiveSection(button.dataset.section);
        const url = new URL(window.location.href);
        url.search = "";
        url.searchParams.set("section", state.activeSection);
        history.pushState({}, "", url.pathname + url.search);
        renderLibrary();
      });
    });
    elements.refreshButton.addEventListener("click", () => loadVideos({ forceRefresh: true }));
    elements.themeButton.addEventListener("click", () => {
      const currentIndex = THEME_SEQUENCE.indexOf(currentTheme());
      applyTheme(THEME_SEQUENCE[(currentIndex + 1) % THEME_SEQUENCE.length], true);
    });
    elements.backButton.addEventListener("click", () => {
      history.pushState({}, "", window.location.pathname);
      route();
    });
    window.addEventListener("popstate", route);

    document.addEventListener("click", (event) => {
      const homeLink = event.target.closest("a[data-home-link]");
      if (homeLink && !event.metaKey && !event.ctrlKey && !event.shiftKey && !event.altKey) {
        event.preventDefault();
        history.pushState({}, "", new URL(homeLink.href).pathname);
        route();
        window.scrollTo({ top: 0, behavior: "smooth" });
        return;
      }

      const sectionLink = event.target.closest("a[data-section-link]");
      if (sectionLink && !event.metaKey && !event.ctrlKey && !event.shiftKey && !event.altKey) {
        event.preventDefault();
        elements.searchInput.value = "";
        setActiveSection(sectionLink.dataset.sectionLink);
        history.pushState({}, "", sectionLink.getAttribute("href"));
        route();
        window.scrollTo({ top: 0, behavior: "smooth" });
        return;
      }

      const copyButton = event.target.closest("button[data-copy-url]");
      if (copyButton) {
        copyShareUrl(copyButton);
        return;
      }

      const link = event.target.closest("a[data-content-id]");
      if (!link || event.metaKey || event.ctrlKey || event.shiftKey || event.altKey) return;
      event.preventDefault();
      history.pushState({}, "", link.getAttribute("href"));
      route();
      window.scrollTo({ top: 0, behavior: "smooth" });
    });

    loadVideos();
  </script>
</body>
</html>
