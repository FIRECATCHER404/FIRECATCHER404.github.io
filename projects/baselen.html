<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Baselen Encoder</title>
  <style>
    :root {
      --bg: #07090d;
      --panel: #111820;
      --panel-2: #0d1319;
      --line: #263848;
      --text: #eef7f4;
      --muted: #93a9a2;
      --green: #4dff88;
      --cyan: #48d5ff;
      --red: #ff6b7a;
      --amber: #ffc857;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
      background:
        linear-gradient(rgba(255, 255, 255, 0.035) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255, 255, 255, 0.035) 1px, transparent 1px),
        var(--bg);
      background-size: 92px 92px, 92px 92px, auto;
      color: var(--text);
    }

    body {
      min-height: 100vh;
    }

    button,
    input,
    select,
    textarea {
      color: inherit;
      font: inherit;
    }

    .shell {
      width: min(1180px, calc(100% - 28px));
      margin: 0 auto;
      padding: 18px 0 28px;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      min-height: 58px;
      margin-bottom: 16px;
      border-bottom: 1px solid var(--line);
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      min-width: 0;
    }

    .mark {
      width: 38px;
      height: 38px;
      border: 1px solid rgba(77, 255, 136, 0.55);
      border-radius: 8px;
      display: grid;
      place-items: center;
      color: var(--green);
      background: #0b1117;
      font-family: "Cascadia Code", Consolas, monospace;
      font-weight: 700;
    }

    h1 {
      margin: 0;
      font-size: clamp(1.25rem, 3vw, 1.85rem);
      line-height: 1.1;
      letter-spacing: 0;
    }

    .sub {
      color: var(--muted);
      font-size: 0.86rem;
      margin-top: 3px;
    }

    .topbar a,
    button {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #121b24;
      min-height: 36px;
      padding: 8px 12px;
      text-decoration: none;
      cursor: pointer;
    }

    .topbar a:hover,
    button:hover {
      border-color: rgba(72, 213, 255, 0.65);
      background: #162432;
    }

    .tool {
      display: grid;
      grid-template-columns: 320px minmax(0, 1fr);
      gap: 14px;
      align-items: start;
    }

    .controls,
    .workspace {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(17, 24, 32, 0.94);
      box-shadow: 0 18px 44px rgba(0, 0, 0, 0.28);
    }

    .controls {
      padding: 14px;
      display: grid;
      gap: 13px;
      position: sticky;
      top: 14px;
    }

    .workspace {
      overflow: hidden;
    }

    .row {
      display: grid;
      gap: 7px;
    }

    label,
    .label {
      color: var(--muted);
      font-size: 0.78rem;
    }

    select,
    input,
    textarea {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #091017;
      outline: none;
    }

    select,
    input {
      min-height: 38px;
      padding: 8px 10px;
    }

    select:focus,
    input:focus,
    textarea:focus {
      border-color: var(--cyan);
      box-shadow: 0 0 0 3px rgba(72, 213, 255, 0.13);
    }

    .seg {
      display: grid;
      grid-template-columns: 1fr 1fr;
      border: 1px solid var(--line);
      border-radius: 8px;
      overflow: hidden;
      background: #091017;
    }

    .seg button {
      border: 0;
      border-radius: 0;
      background: transparent;
      min-height: 38px;
    }

    .seg button.active {
      color: #05100a;
      background: var(--green);
      font-weight: 700;
    }

    .primary {
      border-color: rgba(77, 255, 136, 0.65);
      background: rgba(77, 255, 136, 0.16);
      color: var(--green);
      font-weight: 700;
    }

    .actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .primary {
      grid-column: 1 / -1;
    }

    .alphabet-input {
      min-height: 76px;
      max-height: 118px;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 9px 10px;
      background: #091017;
      font-family: "Cascadia Code", Consolas, monospace;
      font-size: 12px;
      line-height: 1.45;
      resize: vertical;
    }

    .alphabet-tools {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }

    .alphabet-tools button {
      min-height: 30px;
      padding: 5px 8px;
      font-size: 0.78rem;
    }

    .alphabet-count {
      color: var(--muted);
      font-family: "Cascadia Code", Consolas, monospace;
      font-size: 0.76rem;
      white-space: nowrap;
    }

    .char-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(28px, 1fr));
      gap: 5px;
      max-height: 270px;
      overflow: auto;
      padding: 8px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #070c11;
    }

    .char-cell {
      width: 100%;
      min-width: 0;
      min-height: 28px;
      padding: 0;
      display: grid;
      place-items: center;
      border-radius: 6px;
      font-family: "Cascadia Code", Consolas, monospace;
      font-size: 13px;
      line-height: 1;
      background: #0d151d;
    }

    .char-cell.selected {
      color: #05100a;
      border-color: rgba(77, 255, 136, 0.8);
      background: var(--green);
      font-weight: 700;
    }

    .char-cell.pending {
      color: #130d00;
      border-color: rgba(255, 200, 87, 0.95);
      background: var(--amber);
    }

    .io {
      display: grid;
      grid-template-columns: minmax(0, 1fr) minmax(0, 1fr);
      min-height: 560px;
    }

    .pane {
      min-width: 0;
      display: grid;
      grid-template-rows: auto minmax(320px, 1fr);
      border-right: 1px solid var(--line);
    }

    .pane:last-child {
      border-right: 0;
    }

    .pane-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      min-height: 46px;
      padding: 9px 11px;
      background: var(--panel-2);
      border-bottom: 1px solid var(--line);
    }

    .pane-head strong {
      font-size: 0.92rem;
    }

    .mini-actions {
      display: flex;
      gap: 7px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .mini-actions button {
      min-height: 30px;
      padding: 5px 8px;
      font-size: 0.78rem;
    }

    textarea {
      resize: none;
      min-height: 100%;
      border: 0;
      border-radius: 0;
      padding: 12px;
      background: #070c11;
      font-family: "Cascadia Code", Consolas, monospace;
      font-size: 13px;
      line-height: 1.45;
      overflow: auto;
    }

    #output {
      color: #dfffea;
    }

    .status {
      min-height: 38px;
      padding: 10px 12px;
      border-top: 1px solid var(--line);
      color: var(--muted);
      font-family: "Cascadia Code", Consolas, monospace;
      font-size: 0.82rem;
      background: #0b1117;
    }

    .status.good {
      color: var(--green);
    }

    .status.bad {
      color: var(--red);
    }

    @media (max-width: 860px) {
      .tool,
      .io {
        grid-template-columns: 1fr;
      }

      .controls {
        position: static;
      }

      .pane {
        border-right: 0;
        border-bottom: 1px solid var(--line);
      }

      .pane:last-child {
        border-bottom: 0;
      }

      .io {
        min-height: auto;
      }
    }
  </style>
<script src="/analytics.js"></script>
</head>
<body>
  <div class="shell">
    <header class="topbar">
      <div class="brand">
        <div class="mark" aria-hidden="true">BL</div>
        <div>
          <h1>Baselen Encoder</h1>
          <div class="sub">custom base&lt;n&gt; encoder / decoder</div>
        </div>
      </div>
      <a href="index.html">Projects</a>
    </header>

    <main class="tool">
      <section class="controls" aria-label="Baselen controls">
        <div class="row">
          <div class="label">Mode</div>
          <div class="seg" role="group" aria-label="Mode">
            <button id="encryptMode" class="active" type="button">Encode</button>
            <button id="decryptMode" type="button">Decode</button>
          </div>
        </div>

        <div class="row">
          <label for="payloadType">Type</label>
          <select id="payloadType">
            <option value="text">Text</option>
            <option value="int">Number / Integer</option>
            <option value="bytes">Bytes as hex</option>
          </select>
        </div>

        <div class="row">
          <label for="baseAmount">Base amount</label>
          <input id="baseAmount" type="number" min="2" max="300" step="1" value="10" inputmode="numeric" />
        </div>

        <div class="row">
          <label for="spacingAmount">Spacing characters per block</label>
          <input id="spacingAmount" type="number" min="0" step="1" value="3" inputmode="numeric" />
        </div>

        <div class="row">
          <label for="alphabetInput">Alphabet</label>
          <textarea id="alphabetInput" class="alphabet-input" spellcheck="false">0123456789abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ!#$%&amp;()*+,-./:;&lt;=&gt;?@[]^_{|}~¡¢£¤¥¦§¨©ª«¬®¯°±²³´µ¶·¸¹º»¼½¾¿ÀÁÂÃÄÅÆÇÈÉÊËÌÍÎÏÐÑÒÓÔÕÖ×ØÙÚÛÜÝÞßàáâãäåæçèéêëìíîïðñòóôõö÷øùúûüýþÿΑΒΓΔΕΖΗΘΙΚΛΜΝΞΟΠΡΣΤΥΦΧΨΩΪΫάέήίΰαβγδεζηθικλμνξοπρςστυφχψωϊϋόύώАБВГДЕЖЗИЙКЛМНОПРСТУФХЦЧШЩЪЫЬЭЮЯабвгдежзийклмнопрстуфхц</textarea>
          <div class="alphabet-tools">
            <button id="resetAlphabetBtn" type="button">Reset</button>
            <span id="alphabetCount" class="alphabet-count">0 chars</span>
          </div>
          <div id="charGrid" class="char-grid" aria-label="Alphabet characters"></div>
        </div>

        <div class="actions">
          <button id="runBtn" class="primary" type="button">Encode</button>
          <button id="swapBtn" type="button">Swap</button>
          <button id="clearBtn" type="button">Clear</button>
        </div>
      </section>

      <section class="workspace" aria-label="Baselen workspace">
        <div class="io">
          <div class="pane">
            <div class="pane-head">
              <strong id="inputTitle">Plain input</strong>
              <div class="mini-actions">
                <button id="pasteBtn" type="button">Paste</button>
              </div>
            </div>
            <textarea id="input" spellcheck="false" placeholder="Type text to encode"></textarea>
          </div>

          <div class="pane">
            <div class="pane-head">
              <strong id="outputTitle">Encoded output</strong>
              <div class="mini-actions">
                <button id="copyBtn" type="button">Copy</button>
                <button id="downloadBtn" type="button">Download</button>
              </div>
            </div>
            <textarea id="output" spellcheck="false" readonly></textarea>
          </div>
        </div>
        <div id="status" class="status">Ready.</div>
      </section>
    </main>
  </div>

  <script type="module">
    import {
      assertSupported,
      bytesToHex,
      DEFAULT_ALPHABET,
      decryptBytes,
      decryptInteger,
      decryptText,
      encryptBytes,
      encryptInteger,
      encryptText,
      getDefaultSpacingForBase,
      getPreferredAlphabet,
      hexToBytes,
      validateAlphabet
    } from "./baselen-core.js";

    const encryptMode = document.getElementById("encryptMode");
    const decryptMode = document.getElementById("decryptMode");
    const payloadType = document.getElementById("payloadType");
    const baseAmount = document.getElementById("baseAmount");
    const spacingAmount = document.getElementById("spacingAmount");
    const alphabetInput = document.getElementById("alphabetInput");
    const alphabetCount = document.getElementById("alphabetCount");
    const charGrid = document.getElementById("charGrid");
    const input = document.getElementById("input");
    const output = document.getElementById("output");
    const status = document.getElementById("status");
    const inputTitle = document.getElementById("inputTitle");
    const outputTitle = document.getElementById("outputTitle");
    const runBtn = document.getElementById("runBtn");
    const swapBtn = document.getElementById("swapBtn");
    const clearBtn = document.getElementById("clearBtn");
    const copyBtn = document.getElementById("copyBtn");
    const pasteBtn = document.getElementById("pasteBtn");
    const downloadBtn = document.getElementById("downloadBtn");
    const resetAlphabetBtn = document.getElementById("resetAlphabetBtn");

    let mode = "encrypt";
    let selectedChars = [];
    let pendingSlot = null;
    let lastSpacingBase = null;

    function setMode(nextMode) {
      mode = nextMode;
      encryptMode.classList.toggle("active", mode === "encrypt");
      decryptMode.classList.toggle("active", mode === "decrypt");
      runBtn.textContent = mode === "encrypt" ? "Encode" : "Decode";
      inputTitle.textContent = mode === "encrypt" ? "Plain input" : "Encoded input";
      outputTitle.textContent = mode === "encrypt" ? "Encoded output" : "Plain output";
      updatePlaceholder();
    }

    function setStatus(message, kind = "") {
      status.textContent = message;
      status.className = `status ${kind}`.trim();
    }

    function updatePlaceholder() {
      const type = payloadType.value;
      if (mode === "decrypt") {
        input.placeholder = `Paste base${baseAmount.value || "n"} encoded input`;
      } else if (type === "int") {
        input.placeholder = "Type a number, including very large or negative integers";
      } else if (type === "bytes") {
        input.placeholder = "Type bytes as hex, for example: 48656c6c6f";
      } else {
        input.placeholder = "Type text to encode";
      }
    }

    function syncAlphabet() {
      let chars;
      try {
        chars = validateAlphabet(alphabetInput.value);
      } catch (error) {
        alphabetCount.textContent = `${[...alphabetInput.value].length} chars`;
        charGrid.replaceChildren();
        setStatus(error.message || String(error), "bad");
        return;
      }

      baseAmount.max = String(chars.length);
      const rawBase = baseAmount.value.trim();
      const numericBase = Number(rawBase);
      if (rawBase === "" || !Number.isFinite(numericBase) || numericBase < 2) {
        renderAlphabet(chars);
        updatePlaceholder();
        setStatus(`Enter a base amount from 2 to ${chars.length}.`);
        return;
      }

      let base = Math.trunc(numericBase);
      if (base > chars.length) {
        base = chars.length;
        baseAmount.value = String(base);
      } else if (numericBase !== base) {
        baseAmount.value = String(base);
      }
      if (base !== lastSpacingBase) {
        spacingAmount.value = String(getDefaultSpacingForBase(base));
        lastSpacingBase = base;
      }

      const currentSelectionValid =
        selectedChars.length === base &&
        selectedChars.every((char) => chars.includes(char)) &&
        new Set(selectedChars).size === selectedChars.length;

      selectedChars = currentSelectionValid
        ? selectedChars
        : [...getPreferredAlphabet(base, alphabetInput.value)];
      if (pendingSlot !== null && pendingSlot >= selectedChars.length) pendingSlot = null;
      renderAlphabet(chars);
      updatePlaceholder();
      setStatus(`Ready. Base${selectedChars.length} alphabet selected.`);
    }

    function renderAlphabet(chars = validateAlphabet(alphabetInput.value)) {
      alphabetCount.textContent = `${chars.length} chars`;
      const selectedSet = new Set(selectedChars);
      const fragment = document.createDocumentFragment();

      chars.forEach((char) => {
        const button = document.createElement("button");
        const slot = selectedChars.indexOf(char);
        button.type = "button";
        button.className = "char-cell";
        button.textContent = char;
        button.title = slot >= 0 ? `Base position ${slot}` : "Available";
        button.setAttribute("aria-label", slot >= 0 ? `${char}, base position ${slot}` : `${char}, available`);
        if (selectedSet.has(char)) button.classList.add("selected");
        if (slot === pendingSlot) button.classList.add("pending");
        button.addEventListener("click", () => handleCharacterClick(char));
        fragment.appendChild(button);
      });

      charGrid.replaceChildren(fragment);
    }

    function handleCharacterClick(char) {
      const slot = selectedChars.indexOf(char);
      if (slot >= 0) {
        pendingSlot = slot;
        renderAlphabet();
        setStatus(`Selected base position ${slot}.`);
        return;
      }

      if (pendingSlot === null) {
        setStatus("Select a highlighted character first.", "bad");
        return;
      }

      selectedChars[pendingSlot] = char;
      pendingSlot = null;
      renderAlphabet();
      setStatus(`Ready. Base${selectedChars.length} alphabet selected.`, "good");
    }

    function getSelectedAlphabet() {
      const chars = validateAlphabet(alphabetInput.value);
      const base = Math.trunc(Number(baseAmount.value));
      if (!Number.isInteger(base) || base < 2) throw new Error("Base amount must be a number of at least 2.");
      if (base > chars.length) throw new Error("Base amount cannot be larger than the alphabet.");
      if (selectedChars.length !== base) syncAlphabet();

      const alphabetChars = new Set(chars);
      const active = selectedChars.slice(0, base);
      if (active.length !== base || active.some((char) => !alphabetChars.has(char))) {
        throw new Error("Selected alphabet is incomplete.");
      }
      if (new Set(active).size !== active.length) throw new Error("Selected alphabet has duplicate characters.");
      return active.join("");
    }

    function getSpacingAmount() {
      const rawSpacing = spacingAmount.value.trim();
      if (rawSpacing === "") throw new Error("Spacing must be 0 or more characters per block.");
      const numericSpacing = Number(rawSpacing);
      if (!Number.isFinite(numericSpacing) || numericSpacing < 0) {
        throw new Error("Spacing must be 0 or more characters per block.");
      }
      const spacing = Math.trunc(numericSpacing);
      if (numericSpacing !== spacing) spacingAmount.value = String(spacing);
      return spacing;
    }

    async function run() {
      runBtn.disabled = true;
      setStatus(mode === "encrypt" ? "Encoding..." : "Decoding...");

      try {
        const type = payloadType.value;
        const selectedAlphabet = getSelectedAlphabet();
        const selectedSpacing = getSpacingAmount();
        const value = input.value;
        let result;

        if (mode === "encrypt") {
          if (type === "text") result = await encryptText(value, selectedAlphabet, selectedSpacing);
          if (type === "int") result = await encryptInteger(value, selectedAlphabet, selectedSpacing);
          if (type === "bytes") result = await encryptBytes(hexToBytes(value), selectedAlphabet, selectedSpacing);
        } else {
          if (type === "text") result = await decryptText(value, selectedAlphabet);
          if (type === "int") result = await decryptInteger(value, selectedAlphabet);
          if (type === "bytes") result = bytesToHex(await decryptBytes(value, selectedAlphabet));
        }

        output.value = result;
        setStatus(`Done. Used base${selectedAlphabet.length} with ${selectedSpacing}-character blocks.`, "good");
      } catch (error) {
        setStatus(error.message || String(error), "bad");
      } finally {
        runBtn.disabled = false;
      }
    }

    async function copyOutput() {
      await navigator.clipboard.writeText(output.value);
      setStatus("Copied.", "good");
    }

    async function pasteInput() {
      input.value = await navigator.clipboard.readText();
      setStatus("Pasted.", "good");
    }

    function downloadOutput() {
      const blob = new Blob([output.value], { type: "text/plain;charset=utf-8" });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = mode === "encrypt" ? `baselen.base${selectedChars.length}.txt` : "baselen-decoded.txt";
      a.click();
      URL.revokeObjectURL(url);
    }

    encryptMode.addEventListener("click", () => setMode("encrypt"));
    decryptMode.addEventListener("click", () => setMode("decrypt"));
    payloadType.addEventListener("change", updatePlaceholder);
    baseAmount.addEventListener("input", syncAlphabet);
    spacingAmount.addEventListener("input", () => {
      if (spacingAmount.value.trim() === "") {
        setStatus("Enter 0 for no spacing, or a block size.");
        return;
      }
      try {
        getSpacingAmount();
        setStatus(`Ready. Using ${spacingAmount.value}-character blocks.`);
      } catch (error) {
        setStatus(error.message || String(error), "bad");
      }
    });
    alphabetInput.addEventListener("input", syncAlphabet);
    resetAlphabetBtn.addEventListener("click", () => {
      alphabetInput.value = DEFAULT_ALPHABET;
      baseAmount.value = "10";
      spacingAmount.value = "3";
      lastSpacingBase = 10;
      selectedChars = [];
      pendingSlot = null;
      syncAlphabet();
    });
    runBtn.addEventListener("click", run);
    copyBtn.addEventListener("click", copyOutput);
    pasteBtn.addEventListener("click", pasteInput);
    downloadBtn.addEventListener("click", downloadOutput);
    clearBtn.addEventListener("click", () => {
      input.value = "";
      output.value = "";
      setStatus("Ready.");
    });
    swapBtn.addEventListener("click", () => {
      input.value = output.value;
      output.value = "";
      setMode(mode === "encrypt" ? "decrypt" : "encrypt");
      setStatus("Swapped.");
    });

    try {
      assertSupported();
      alphabetInput.value = DEFAULT_ALPHABET;
      syncAlphabet();
      setMode("encrypt");
    } catch (error) {
      setStatus(error.message || String(error), "bad");
      runBtn.disabled = true;
    }
  </script>
</body>
</html>
