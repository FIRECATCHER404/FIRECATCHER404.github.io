<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />
  <title>Water Lab</title>
  <style>
    body, html {
      margin: 0;
      padding: 0;
      overflow: hidden;
      font-family: sans-serif;
      background: #111;
      color: white;
    }

    canvas {
      display: block;
      background: #222;
      touch-action: none;
    }

    .controls {
      position: absolute;
      top: 10px;
      left: 10px;
      background: rgba(0, 0, 0, 0.6);
      padding: 10px;
      border-radius: 10px;
    }

    .controls label {
      display: block;
      margin: 5px 0 2px;
    }

    .controls input, .controls select {
      width: 200px;
    }

    .controls button {
      margin-top: 6px;
      background: #00aaff;
      border: none;
      padding: 8px 12px;
      border-radius: 8px;
      cursor: pointer;
      color: white;
    }

    .controls button:hover {
      background: #0077cc;
    }

    .back-btn {
      position: absolute;
      top: 10px;
      right: 10px;
      background: #00aaff;
      border: none;
      padding: 10px 20px;
      border-radius: 10px;
      cursor: pointer;
      color: white;
      font-size: 16px;
    }

    .back-btn:hover {
      background: #0077cc;
    }
  </style>
</head>
<body>
<canvas id="canvas"></canvas>

<div class="controls">
  <label>Gravity X</label>
  <input type="range" id="gx" min="-1" max="1" step="0.01" value="0">
  <label>Gravity Y</label>
  <input type="range" id="gy" min="-1" max="1" step="0.01" value="0.2">
  <label>Gravity Strength</label>
  <input type="range" id="gstrength" min="0" max="2" step="0.01" value="1">
  <label>Friction / Viscosity</label>
  <input type="range" id="viscosity" min="0" max="0.18" step="0.005" value="0.035">
  <label>Speed (FPS)</label>
  <input type="range" id="fps" min="10" max="120" step="1" value="60">
  <label>Brush Size</label>
  <input type="range" id="brushSize" min="18" max="120" step="2" value="54">
  <label>Place</label>
  <select id="toolSelect">
    <option value="water">Water</option>
    <option value="draw">Draw</option>
  </select>
  <br>
  <button type="button" id="clearWater">Clear Water</button>
  <button type="button" id="clearDraw">Clear Draw</button>
  <br>
  <button onclick="location.href='../index.html'">Main Menu</button>
</div>

<button class="back-btn" onclick="location.href='../index.html'">Back to Menu</button>

<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let gravityX = 0;
let gravityY = 0.2;
let gravityStrength = 1;
let viscosity = 0.035;
let targetFps = 60;
let brushSize = 54;

const gxSlider = document.getElementById('gx');
const gySlider = document.getElementById('gy');
const gstrengthSlider = document.getElementById('gstrength');
const viscositySlider = document.getElementById('viscosity');
const fpsSlider = document.getElementById('fps');
const brushSlider = document.getElementById('brushSize');
const toolSelect = document.getElementById('toolSelect');
const clearWaterBtn = document.getElementById('clearWater');
const clearDrawBtn = document.getElementById('clearDraw');

gxSlider.addEventListener('input', () => gravityX = parseFloat(gxSlider.value));
gySlider.addEventListener('input', () => gravityY = parseFloat(gySlider.value));
gstrengthSlider.addEventListener('input', () => gravityStrength = parseFloat(gstrengthSlider.value));
viscositySlider.addEventListener('input', () => viscosity = parseFloat(viscositySlider.value));
fpsSlider.addEventListener('input', () => targetFps = parseFloat(fpsSlider.value));
brushSlider.addEventListener('input', () => brushSize = parseFloat(brushSlider.value));

const water = [];
const walls = [];
let isDrawing = false;
let lastPoint = null;
let accumulator = 0;
let lastFrameTime = performance.now();

const particleRadius = 3.2;
const particleSpacing = particleRadius * 2.15;
const maxParticles = 1800;
const collisionRestitution = 0.24;
const wallRadius = 7;
const gridSize = particleRadius * 5;

function getCanvasPoint(e) {
  const rect = canvas.getBoundingClientRect();
  return { x: e.clientX - rect.left, y: e.clientY - rect.top };
}

function createWaterParticle(x, y) {
  return {
    x,
    y,
    vx: (Math.random() - 0.5) * 0.8,
    vy: (Math.random() - 0.5) * 0.8,
    size: particleRadius
  };
}

function placeWaterSquare(x, y) {
  const half = brushSize / 2;
  const jitter = particleSpacing * 0.2;

  for (let yy = -half; yy <= half; yy += particleSpacing) {
    for (let xx = -half; xx <= half; xx += particleSpacing) {
      if (water.length >= maxParticles) return;
      water.push(createWaterParticle(
        x + xx + (Math.random() - 0.5) * jitter,
        y + yy + (Math.random() - 0.5) * jitter
      ));
    }
  }
}

function addWallSegment(a, b) {
  const dx = b.x - a.x;
  const dy = b.y - a.y;
  if (Math.hypot(dx, dy) < 3) return;
  walls.push({ x1: a.x, y1: a.y, x2: b.x, y2: b.y });
}

function closestPointOnSegment(point, wall) {
  const abx = wall.x2 - wall.x1;
  const aby = wall.y2 - wall.y1;
  const apx = point.x - wall.x1;
  const apy = point.y - wall.y1;
  const lengthSq = abx * abx + aby * aby || 1;
  const t = Math.max(0, Math.min(1, (apx * abx + apy * aby) / lengthSq));

  return {
    x: wall.x1 + abx * t,
    y: wall.y1 + aby * t
  };
}

function buildGrid() {
  const grid = new Map();

  for (let i = 0; i < water.length; i++) {
    const p = water[i];
    const cx = Math.floor(p.x / gridSize);
    const cy = Math.floor(p.y / gridSize);
    const key = `${cx},${cy}`;
    if (!grid.has(key)) grid.set(key, []);
    grid.get(key).push(i);
  }

  return grid;
}

function resolveWaterCollisions() {
  const grid = buildGrid();
  const minDist = particleRadius * 2;

  for (let i = 0; i < water.length; i++) {
    const a = water[i];
    const cx = Math.floor(a.x / gridSize);
    const cy = Math.floor(a.y / gridSize);

    for (let gx = cx - 1; gx <= cx + 1; gx++) {
      for (let gy = cy - 1; gy <= cy + 1; gy++) {
        const cell = grid.get(`${gx},${gy}`);
        if (!cell) continue;

        for (const j of cell) {
          if (j <= i) continue;

          const b = water[j];
          const dx = b.x - a.x;
          const dy = b.y - a.y;
          const dist = Math.sqrt(dx * dx + dy * dy) || 0.0001;
          const overlap = minDist - dist;

          if (overlap > 0) {
            const nx = dx / dist;
            const ny = dy / dist;
            const push = overlap * 0.52;

            a.x -= nx * push;
            a.y -= ny * push;
            b.x += nx * push;
            b.y += ny * push;

            const dvx = b.vx - a.vx;
            const dvy = b.vy - a.vy;
            const impact = dvx * nx + dvy * ny;

            if (impact < 0) {
              const impulse = -(1 + collisionRestitution) * impact * 0.5;
              a.vx -= nx * impulse;
              a.vy -= ny * impulse;
              b.vx += nx * impulse;
              b.vy += ny * impulse;
            }

            const blend = viscosity * 0.7;
            const avgX = (a.vx + b.vx) * 0.5;
            const avgY = (a.vy + b.vy) * 0.5;
            a.vx += (avgX - a.vx) * blend;
            a.vy += (avgY - a.vy) * blend;
            b.vx += (avgX - b.vx) * blend;
            b.vy += (avgY - b.vy) * blend;
          }
        }
      }
    }
  }
}

function resolveWallCollision(p) {
  for (const wall of walls) {
    const closest = closestPointOnSegment(p, wall);
    const dx = p.x - closest.x;
    const dy = p.y - closest.y;
    const dist = Math.sqrt(dx * dx + dy * dy) || 0.0001;
    const minDist = p.size + wallRadius;
    const overlap = minDist - dist;

    if (overlap > 0) {
      const nx = dx / dist;
      const ny = dy / dist;

      p.x += nx * overlap;
      p.y += ny * overlap;

      const impact = p.vx * nx + p.vy * ny;
      if (impact < 0) {
        p.vx -= (1 + 0.45) * impact * nx;
        p.vy -= (1 + 0.45) * impact * ny;
      }

      p.vx *= 1 - viscosity * 0.75;
      p.vy *= 1 - viscosity * 0.75;
    }
  }
}

function stepPhysics() {
  const damp = 1 - viscosity;

  for (const p of water) {
    p.vx += gravityX * gravityStrength;
    p.vy += gravityY * gravityStrength;
    p.vx *= damp;
    p.vy *= damp;

    p.x += p.vx;
    p.y += p.vy;

    if (p.x - p.size < 0) {
      p.x = p.size;
      p.vx *= -0.55;
    }
    if (p.x + p.size > canvas.width) {
      p.x = canvas.width - p.size;
      p.vx *= -0.55;
    }
    if (p.y - p.size < 0) {
      p.y = p.size;
      p.vy *= -0.55;
    }
    if (p.y + p.size > canvas.height) {
      p.y = canvas.height - p.size;
      p.vy *= -0.45;
      p.vx *= 0.96;
    }

    resolveWallCollision(p);
  }

  for (let i = 0; i < 3; i++) {
    resolveWaterCollisions();
  }
}

function drawWater() {
  if (water.length === 0) return;

  const binWidth = 6;
  const binCount = Math.ceil(canvas.width / binWidth);
  const top = new Array(binCount).fill(Infinity);
  const bottom = new Array(binCount).fill(-Infinity);
  const count = new Array(binCount).fill(0);
  const renderRadius = particleRadius * 2.2;

  function markBin(index, high, low) {
    if (index < 0 || index >= binCount) return;
    top[index] = Math.min(top[index], high);
    bottom[index] = Math.max(bottom[index], low);
    count[index]++;
  }

  // The water is still made of circle particles, but this draws them as joined bodies.
  for (const p of water) {
    const start = Math.floor((p.x - renderRadius) / binWidth);
    const end = Math.ceil((p.x + renderRadius) / binWidth);

    for (let i = start; i <= end; i++) {
      const x = i * binWidth + binWidth / 2;
      const dx = x - p.x;
      if (Math.abs(dx) > renderRadius) continue;

      const edge = Math.sqrt(renderRadius * renderRadius - dx * dx);
      markBin(i, p.y - edge, p.y + edge);
    }
  }

  for (let pass = 0; pass < 2; pass++) {
    const nextTop = top.slice();
    const nextBottom = bottom.slice();

    for (let i = 1; i < binCount - 1; i++) {
      if (!count[i]) continue;

      const neighbors = [i - 1, i, i + 1].filter(index => count[index]);
      nextTop[i] = neighbors.reduce((sum, index) => sum + top[index], 0) / neighbors.length;
      nextBottom[i] = neighbors.reduce((sum, index) => sum + bottom[index], 0) / neighbors.length;
    }

    for (let i = 0; i < binCount; i++) {
      top[i] = nextTop[i];
      bottom[i] = nextBottom[i];
    }
  }

  ctx.save();
  ctx.fillStyle = 'rgba(0, 145, 235, 0.58)';
  ctx.strokeStyle = 'rgba(125, 210, 255, 0.72)';
  ctx.lineWidth = 2;

  let i = 0;
  while (i < binCount) {
    while (i < binCount && !count[i]) i++;
    if (i >= binCount) break;

    const start = i;
    while (i < binCount && count[i]) i++;
    const end = i - 1;

    if (end - start < 1) continue;

    ctx.beginPath();
    ctx.moveTo(start * binWidth, top[start]);

    for (let j = start + 1; j <= end; j++) {
      ctx.lineTo(j * binWidth, top[j]);
    }

    for (let j = end; j >= start; j--) {
      ctx.lineTo(j * binWidth, bottom[j]);
    }

    ctx.closePath();
    ctx.fill();

    ctx.beginPath();
    ctx.moveTo(start * binWidth, top[start]);
    for (let j = start + 1; j <= end; j++) {
      ctx.lineTo(j * binWidth, top[j]);
    }
    ctx.stroke();
  }

  ctx.restore();
}

function drawWalls() {
  ctx.lineCap = 'round';
  ctx.lineJoin = 'round';

  for (const wall of walls) {
    ctx.beginPath();
    ctx.moveTo(wall.x1, wall.y1);
    ctx.lineTo(wall.x2, wall.y2);
    ctx.strokeStyle = '#d7d7d7';
    ctx.lineWidth = wallRadius * 2;
    ctx.stroke();

    ctx.beginPath();
    ctx.moveTo(wall.x1, wall.y1);
    ctx.lineTo(wall.x2, wall.y2);
    ctx.strokeStyle = '#444';
    ctx.lineWidth = 2;
    ctx.stroke();
  }
}

function drawBrushPreview() {
  if (!isDrawing || !lastPoint) return;

  ctx.save();
  ctx.strokeStyle = toolSelect.value === 'water' ? 'rgba(0, 170, 255, 0.9)' : 'white';
  ctx.lineWidth = 2;

  if (toolSelect.value === 'water') {
    const half = brushSize / 2;
    ctx.strokeRect(lastPoint.x - half, lastPoint.y - half, brushSize, brushSize);
  } else {
    ctx.beginPath();
    ctx.arc(lastPoint.x, lastPoint.y, wallRadius, 0, Math.PI * 2);
    ctx.stroke();
  }

  ctx.restore();
}

function draw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  drawWater();
  drawWalls();
  drawBrushPreview();
}

function loop(now) {
  const elapsed = Math.min(now - lastFrameTime, 100);
  lastFrameTime = now;
  accumulator += elapsed;

  const frameMs = 1000 / targetFps;
  let steps = 0;

  while (accumulator >= frameMs && steps < 8) {
    stepPhysics();
    accumulator -= frameMs;
    steps++;
  }

  draw();
  requestAnimationFrame(loop);
}

function startAction(point) {
  isDrawing = true;
  lastPoint = point;

  if (toolSelect.value === 'water') {
    placeWaterSquare(point.x, point.y);
  }
}

function moveAction(point) {
  if (!isDrawing) return;

  if (toolSelect.value === 'water') {
    placeWaterSquare(point.x, point.y);
  } else if (lastPoint) {
    addWallSegment(lastPoint, point);
  }

  lastPoint = point;
}

function finishAction() {
  isDrawing = false;
  lastPoint = null;
}

function getTouchPoint(e) {
  const touch = e.changedTouches[0] || e.touches[0];
  if (!touch) return lastPoint || { x: 0, y: 0 };
  return getCanvasPoint(touch);
}

if (window.PointerEvent) {
  canvas.addEventListener('pointerdown', (e) => {
    if (e.button !== undefined && e.button !== 0) return;
    e.preventDefault();
    startAction(getCanvasPoint(e));
    if (canvas.setPointerCapture) {
      canvas.setPointerCapture(e.pointerId);
    }
  });

  canvas.addEventListener('pointermove', (e) => {
    if (!isDrawing) return;
    e.preventDefault();
    moveAction(getCanvasPoint(e));
  });

  canvas.addEventListener('pointerup', finishAction);
  canvas.addEventListener('pointercancel', finishAction);
  canvas.addEventListener('lostpointercapture', finishAction);
} else {
  canvas.addEventListener('mousedown', (e) => {
    if (e.button !== 0) return;
    startAction(getCanvasPoint(e));
  });

  canvas.addEventListener('mousemove', (e) => {
    moveAction(getCanvasPoint(e));
  });

  window.addEventListener('mouseup', finishAction);

  canvas.addEventListener('touchstart', (e) => {
    e.preventDefault();
    startAction(getTouchPoint(e));
  }, { passive: false });

  canvas.addEventListener('touchmove', (e) => {
    e.preventDefault();
    moveAction(getTouchPoint(e));
  }, { passive: false });

  canvas.addEventListener('touchend', (e) => {
    e.preventDefault();
    finishAction();
  }, { passive: false });

  canvas.addEventListener('touchcancel', (e) => {
    e.preventDefault();
    finishAction();
  }, { passive: false });
}

clearWaterBtn.addEventListener('click', () => {
  water.length = 0;
});

clearDrawBtn.addEventListener('click', () => {
  walls.length = 0;
});

window.addEventListener('resize', () => {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
});

requestAnimationFrame(loop);
</script>
</body>
</html>
