<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />
  <title>Gravity Lab</title>
  <style>
    body, html {
      margin: 0;
      padding: 0;
      overflow: hidden;
      font-family: sans-serif;
      background: #111;
      color: white;
    }

    canvas {
      display: block;
      background: #222;
      touch-action: none;
    }

    .controls {
      position: absolute;
      top: 10px;
      left: 10px;
      background: rgba(0, 0, 0, 0.6);
      padding: 10px;
      border-radius: 10px;
    }

    .controls label {
      display: block;
      margin: 5px 0 2px;
    }

    .controls input, .controls select {
      width: 200px;
    }

    .mobile-motion {
      display: none;
      margin-top: 8px;
      padding-top: 8px;
      border-top: 1px solid rgba(255, 255, 255, 0.22);
    }

    .mobile-motion button {
      width: 130px;
      margin-top: 4px;
      padding: 7px 10px;
      border: 0;
      border-radius: 8px;
      background: #00aaff;
      color: white;
      cursor: pointer;
    }

    .mobile-motion button.active {
      background: #20c76f;
    }

    .mobile-motion button:disabled {
      background: #555;
      cursor: not-allowed;
    }

    .motion-status {
      display: inline-block;
      margin-left: 8px;
      min-width: 62px;
      color: #cfcfcf;
      font-size: 13px;
    }

    .mobile-motion.available {
      display: block;
    }

    .back-btn {
      position: absolute;
      top: 10px;
      right: 10px;
      background: #00aaff;
      border: none;
      padding: 10px 20px;
      border-radius: 10px;
      cursor: pointer;
      color: white;
      font-size: 16px;
    }

    .back-btn:hover {
      background: #0077cc;
    }
  </style>
<script src="/analytics.js"></script>
</head>
<body>
<canvas id="canvas"></canvas>

<div class="controls">
  <label>Gravity X</label>
  <input type="range" id="gx" min="-1" max="1" step="0.01" value="0">
  <label>Gravity Y</label>
  <input type="range" id="gy" min="-1" max="1" step="0.01" value="0.2">
  <label>Gravity Strength</label>
  <input type="range" id="gstrength" min="0" max="2" step="0.01" value="1">
  <div class="mobile-motion" id="mobileMotion">
    <label>Phone Gravity</label>
    <button type="button" id="motionToggle">Enable Gravity</button>
    <span class="motion-status" id="motionStatus">Off</span>
  </div>
  <label>Shape</label>
  <select id="shapeSelect">
    <option value="circle">Circle</option>
    <option value="square">Square</option>
    <option value="triangle">Triangle</option>
  </select>
  <label>Color</label>
  <input type="color" id="colorPicker" value="#00aaff">
  <button onclick="location.href='../index.html'">Main Menu</button>
</div>

<button class="back-btn" onclick="location.href='../index.html'">Back to Menu</button>

<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const screenOrientation = window.screen && window.screen.orientation;

function getScreenAngle() {
  const angle = screenOrientation && typeof screenOrientation.angle === 'number'
    ? screenOrientation.angle
    : (typeof window.orientation === 'number' ? window.orientation : 0);
  return ((Math.round(angle / 90) * 90) % 360 + 360) % 360;
}

let lastScreenAngle = getScreenAngle();

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let gravityX = 0;
let gravityY = 0.2;
let gravityStrength = 1;
let phoneGravityEnabled = false;
let phoneGravityX = 0;
let phoneGravityY = 0.2;
let phoneGravityListenerAttached = false;
let lastPhoneGravityEventTime = 0;
let lastMotionGravityTime = 0;
let phoneGravityDataTimer = 0;
let phoneGravityCalibration = 0;
let phoneGravityNeedsCalibration = true;
let phoneGravityIsLevel = false;

const SENSOR_GRAVITY = 9.80665;
const PHONE_GRAVITY_ACCELERATION = 0.45;
const PHONE_GRAVITY_SMOOTHING = 0.35;
const PHONE_GRAVITY_LEVEL_DEADZONE = 0.18;

const gxSlider = document.getElementById('gx');
const gySlider = document.getElementById('gy');
const gstrengthSlider = document.getElementById('gstrength');
const shapeSelect = document.getElementById('shapeSelect');
const colorPicker = document.getElementById('colorPicker');
const mobileMotion = document.getElementById('mobileMotion');
const motionToggle = document.getElementById('motionToggle');
const motionStatus = document.getElementById('motionStatus');
const hasTouchScreen =
  navigator.maxTouchPoints > 0 ||
  navigator.msMaxTouchPoints > 0 ||
  window.matchMedia('(pointer: coarse)').matches ||
  'ontouchstart' in window;
const hasOrientationSensor = typeof window.DeviceOrientationEvent !== 'undefined';
const hasMotionSensor = typeof window.DeviceMotionEvent !== 'undefined';
const hasTiltSensor = hasOrientationSensor || hasMotionSensor;
const likelyTabletSize =
  Math.min(window.innerWidth, window.innerHeight) <= 1024 &&
  Math.max(window.innerWidth, window.innerHeight) <= 1400;
const canShowTiltControls = hasTouchScreen || likelyTabletSize;
const pageProtocol = window.location ? window.location.protocol : '';
const isSensorContextAllowed =
  window.isSecureContext ||
  pageProtocol === 'https:' ||
  pageProtocol === 'file:';

gxSlider.addEventListener('input', () => gravityX = parseFloat(gxSlider.value));
gySlider.addEventListener('input', () => gravityY = parseFloat(gySlider.value));
gstrengthSlider.addEventListener('input', () => gravityStrength = parseFloat(gstrengthSlider.value));

if (canShowTiltControls) {
  mobileMotion.classList.add('available');
}

if (canShowTiltControls && !hasTiltSensor) {
  motionStatus.textContent = 'Unavailable';
} else if (!isSensorContextAllowed) {
  motionStatus.textContent = 'Needs HTTPS';
}

const RESTITUTION = 0.5;
const WALL_RESTITUTION = 0.55;
const FRICTION = 0.42;
const WALL_FRICTION = 0.58;
const PHYSICS_SUBSTEPS = 3;
const COLLISION_ITERATIONS = 5;
const LINEAR_DAMPING = 0.999;
const ANGULAR_DAMPING = 0.992;
const MAX_SPEED = 90;
const MAX_ANGULAR_SPEED = 0.65;
const CONTACT_SLOP = 0.02;

function dot(a, b) {
  return a.x * b.x + a.y * b.y;
}

function cross(a, b) {
  return a.x * b.y - a.y * b.x;
}

function lengthSq(v) {
  return v.x * v.x + v.y * v.y;
}

function normalize(v) {
  const length = Math.hypot(v.x, v.y);
  if (length < 0.000001) return { x: 1, y: 0 };
  return { x: v.x / length, y: v.y / length };
}

function clamp(value, min, max) {
  return Math.max(min, Math.min(max, value));
}

function getShapeArea(shape, size) {
  if (shape === 'circle') return Math.PI * size * size;
  if (shape === 'square') return size * size * 4;
  return size * size * 2;
}

function getShapeInertia(shape, mass, size) {
  if (shape === 'circle') return 0.5 * mass * size * size;
  if (shape === 'square') return (2 / 3) * mass * size * size;
  return 0.5 * mass * size * size;
}

function createShape(x, y, shape, color, size, vx = 0, vy = 0) {
  const mass = Math.max(0.8, getShapeArea(shape, size) / 900);
  const inertia = Math.max(1, getShapeInertia(shape, mass, size));

  return {
    x,
    y,
    shape,
    color,
    size,
    vx,
    vy,
    angle: 0,
    angularVelocity: 0,
    mass,
    invMass: 1 / mass,
    inertia,
    invInertia: 1 / inertia
  };
}

function drawShape(obj) {
  ctx.save();
  ctx.translate(obj.x, obj.y);
  ctx.rotate(obj.angle || 0);
  ctx.fillStyle = obj.color;
  ctx.beginPath();
  if (obj.shape === 'circle') {
    ctx.arc(0, 0, obj.size, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.moveTo(0, 0);
    ctx.lineTo(obj.size, 0);
    ctx.strokeStyle = 'rgba(255, 255, 255, 0.55)';
    ctx.lineWidth = Math.max(1, obj.size * 0.08);
    ctx.stroke();
  } else if (obj.shape === 'square') {
    ctx.fillRect(-obj.size, -obj.size, obj.size * 2, obj.size * 2);
  } else if (obj.shape === 'triangle') {
    ctx.moveTo(0, -obj.size * 4 / 3);
    ctx.lineTo(obj.size, obj.size * 2 / 3);
    ctx.lineTo(-obj.size, obj.size * 2 / 3);
    ctx.closePath();
    ctx.fill();
  }
  ctx.restore();
}

function drawShapeOutline(x, y, shape, size, color, angle = 0) {
  ctx.save();
  ctx.translate(x, y);
  ctx.rotate(angle);
  ctx.beginPath();

  if (shape === 'circle') {
    ctx.arc(0, 0, size, 0, Math.PI * 2);
  } else if (shape === 'square') {
    ctx.rect(-size, -size, size * 2, size * 2);
  } else {
    ctx.moveTo(0, -size * 4 / 3);
    ctx.lineTo(size, size * 2 / 3);
    ctx.lineTo(-size, size * 2 / 3);
    ctx.closePath();
  }

  ctx.strokeStyle = color;
  ctx.lineWidth = 2;
  ctx.stroke();
  ctx.restore();
}

function getLocalVertices(obj) {
  if (obj.shape === 'square') {
    return [
      { x: -obj.size, y: -obj.size },
      { x: obj.size, y: -obj.size },
      { x: obj.size, y: obj.size },
      { x: -obj.size, y: obj.size }
    ];
  }

  if (obj.shape === 'triangle') {
    return [
      { x: 0, y: -obj.size * 4 / 3 },
      { x: obj.size, y: obj.size * 2 / 3 },
      { x: -obj.size, y: obj.size * 2 / 3 }
    ];
  }

  return [];
}

function getWorldVertices(obj) {
  const cos = Math.cos(obj.angle || 0);
  const sin = Math.sin(obj.angle || 0);

  return getLocalVertices(obj).map((point) => ({
    x: obj.x + point.x * cos - point.y * sin,
    y: obj.y + point.x * sin + point.y * cos
  }));
}

function getBroadRadius(obj) {
  if (obj.shape === 'circle') return obj.size;
  return Math.SQRT2 * obj.size;
}

function getBounds(obj) {
  if (obj.shape === 'circle') {
    return {
      minX: obj.x - obj.size,
      maxX: obj.x + obj.size,
      minY: obj.y - obj.size,
      maxY: obj.y + obj.size
    };
  }

  const vertices = getWorldVertices(obj);
  return vertices.reduce((bounds, vertex) => ({
    minX: Math.min(bounds.minX, vertex.x),
    maxX: Math.max(bounds.maxX, vertex.x),
    minY: Math.min(bounds.minY, vertex.y),
    maxY: Math.max(bounds.maxY, vertex.y)
  }), {
    minX: Infinity,
    maxX: -Infinity,
    minY: Infinity,
    maxY: -Infinity
  });
}

function projectVertices(vertices, axis) {
  let min = Infinity;
  let max = -Infinity;

  for (const vertex of vertices) {
    const projected = dot(vertex, axis);
    min = Math.min(min, projected);
    max = Math.max(max, projected);
  }

  return { min, max };
}

function projectCircle(circle, axis) {
  const center = dot(circle, axis);
  return {
    min: center - circle.size,
    max: center + circle.size
  };
}

function getPolygonAxes(vertices) {
  const axes = [];

  for (let i = 0; i < vertices.length; i++) {
    const current = vertices[i];
    const next = vertices[(i + 1) % vertices.length];
    const edge = { x: next.x - current.x, y: next.y - current.y };
    axes.push(normalize({ x: -edge.y, y: edge.x }));
  }

  return axes;
}

function getAverageSupportPoint(vertices, axis, direction) {
  let target = direction > 0 ? -Infinity : Infinity;

  for (const vertex of vertices) {
    const projected = dot(vertex, axis);
    target = direction > 0
      ? Math.max(target, projected)
      : Math.min(target, projected);
  }

  const points = vertices.filter((vertex) => Math.abs(dot(vertex, axis) - target) < 0.5);
  return averagePoints(points.length ? points : vertices);
}

function averagePoints(points) {
  const total = points.reduce((sum, point) => ({
    x: sum.x + point.x,
    y: sum.y + point.y
  }), { x: 0, y: 0 });

  return {
    x: total.x / points.length,
    y: total.y / points.length
  };
}

function closestPointOnSegment(point, a, b) {
  const ab = { x: b.x - a.x, y: b.y - a.y };
  const t = clamp(
    dot({ x: point.x - a.x, y: point.y - a.y }, ab) / Math.max(lengthSq(ab), 0.000001),
    0,
    1
  );

  return {
    x: a.x + ab.x * t,
    y: a.y + ab.y * t
  };
}

function closestPointOnPolygon(point, vertices) {
  let bestPoint = vertices[0];
  let bestDistance = Infinity;

  for (let i = 0; i < vertices.length; i++) {
    const candidate = closestPointOnSegment(point, vertices[i], vertices[(i + 1) % vertices.length]);
    const distance = lengthSq({ x: point.x - candidate.x, y: point.y - candidate.y });

    if (distance < bestDistance) {
      bestDistance = distance;
      bestPoint = candidate;
    }
  }

  return bestPoint;
}

function closestVertex(point, vertices) {
  let bestVertex = vertices[0];
  let bestDistance = Infinity;

  for (const vertex of vertices) {
    const distance = lengthSq({ x: point.x - vertex.x, y: point.y - vertex.y });

    if (distance < bestDistance) {
      bestDistance = distance;
      bestVertex = vertex;
    }
  }

  return bestVertex;
}

function overlapAmount(projectedA, projectedB) {
  return Math.min(projectedA.max, projectedB.max) - Math.max(projectedA.min, projectedB.min);
}

function collideCircles(a, b) {
  const delta = { x: b.x - a.x, y: b.y - a.y };
  const distance = Math.hypot(delta.x, delta.y);
  const penetration = a.size + b.size - distance;

  if (penetration <= 0) return null;

  const normal = distance < 0.000001
    ? { x: 1, y: 0 }
    : { x: delta.x / distance, y: delta.y / distance };
  const aSurface = {
    x: a.x + normal.x * a.size,
    y: a.y + normal.y * a.size
  };
  const bSurface = {
    x: b.x - normal.x * b.size,
    y: b.y - normal.y * b.size
  };

  return {
    normal,
    penetration,
    contact: {
      x: (aSurface.x + bSurface.x) / 2,
      y: (aSurface.y + bSurface.y) / 2
    }
  };
}

function collidePolygons(a, b) {
  const aVertices = getWorldVertices(a);
  const bVertices = getWorldVertices(b);
  const axes = [...getPolygonAxes(aVertices), ...getPolygonAxes(bVertices)];
  let bestAxis = null;
  let smallestOverlap = Infinity;

  for (const axis of axes) {
    const projectedA = projectVertices(aVertices, axis);
    const projectedB = projectVertices(bVertices, axis);
    const overlap = overlapAmount(projectedA, projectedB);

    if (overlap <= 0) return null;

    if (overlap < smallestOverlap) {
      smallestOverlap = overlap;
      bestAxis = axis;
    }
  }

  const centerDelta = { x: b.x - a.x, y: b.y - a.y };
  if (dot(centerDelta, bestAxis) < 0) {
    bestAxis = { x: -bestAxis.x, y: -bestAxis.y };
  }

  const aSupport = getAverageSupportPoint(aVertices, bestAxis, 1);
  const bSupport = getAverageSupportPoint(bVertices, bestAxis, -1);

  return {
    normal: bestAxis,
    penetration: smallestOverlap,
    contact: {
      x: (aSupport.x + bSupport.x) / 2,
      y: (aSupport.y + bSupport.y) / 2
    }
  };
}

function collideCirclePolygon(circle, polygon) {
  const vertices = getWorldVertices(polygon);
  const nearestVertex = closestVertex(circle, vertices);
  const vertexAxis = normalize({
    x: nearestVertex.x - circle.x,
    y: nearestVertex.y - circle.y
  });
  const axes = [...getPolygonAxes(vertices), vertexAxis];
  let bestAxis = null;
  let smallestOverlap = Infinity;

  for (const axis of axes) {
    const projectedCircle = projectCircle(circle, axis);
    const projectedPolygon = projectVertices(vertices, axis);
    const overlap = overlapAmount(projectedCircle, projectedPolygon);

    if (overlap <= 0) return null;

    if (overlap < smallestOverlap) {
      smallestOverlap = overlap;
      bestAxis = axis;
    }
  }

  const centerDelta = { x: polygon.x - circle.x, y: polygon.y - circle.y };
  if (dot(centerDelta, bestAxis) < 0) {
    bestAxis = { x: -bestAxis.x, y: -bestAxis.y };
  }

  return {
    normal: bestAxis,
    penetration: smallestOverlap,
    contact: closestPointOnPolygon(circle, vertices)
  };
}

function detectCollision(a, b) {
  const broadRadius = getBroadRadius(a) + getBroadRadius(b);
  if (lengthSq({ x: b.x - a.x, y: b.y - a.y }) > broadRadius * broadRadius) {
    return null;
  }

  if (a.shape === 'circle' && b.shape === 'circle') {
    return collideCircles(a, b);
  }

  if (a.shape === 'circle') {
    return collideCirclePolygon(a, b);
  }

  if (b.shape === 'circle') {
    const collision = collideCirclePolygon(b, a);
    if (!collision) return null;

    return {
      normal: { x: -collision.normal.x, y: -collision.normal.y },
      penetration: collision.penetration,
      contact: collision.contact
    };
  }

  return collidePolygons(a, b);
}

function velocityAtPoint(body, point) {
  const radius = { x: point.x - body.x, y: point.y - body.y };
  return {
    x: body.vx - body.angularVelocity * radius.y,
    y: body.vy + body.angularVelocity * radius.x
  };
}

function applyImpulse(body, impulse, point) {
  const radius = { x: point.x - body.x, y: point.y - body.y };

  body.vx += impulse.x * body.invMass;
  body.vy += impulse.y * body.invMass;
  body.angularVelocity += cross(radius, impulse) * body.invInertia;
}

function clampBodyMotion(body) {
  const speed = Math.hypot(body.vx, body.vy);

  if (speed > MAX_SPEED) {
    const scale = MAX_SPEED / speed;
    body.vx *= scale;
    body.vy *= scale;
  }

  body.angularVelocity = clamp(body.angularVelocity, -MAX_ANGULAR_SPEED, MAX_ANGULAR_SPEED);
}

function positionCorrectPair(a, b, normal, penetration) {
  const invMassTotal = a.invMass + b.invMass;
  if (invMassTotal <= 0) return;

  const correction = Math.max(penetration - CONTACT_SLOP, 0) / invMassTotal * 0.8;
  a.x -= normal.x * correction * a.invMass;
  a.y -= normal.y * correction * a.invMass;
  b.x += normal.x * correction * b.invMass;
  b.y += normal.y * correction * b.invMass;
}

function resolveCollision(a, b, collision) {
  const normal = collision.normal;
  const contact = collision.contact;

  positionCorrectPair(a, b, normal, collision.penetration);

  const radiusA = { x: contact.x - a.x, y: contact.y - a.y };
  const radiusB = { x: contact.x - b.x, y: contact.y - b.y };
  const velocityA = velocityAtPoint(a, contact);
  const velocityB = velocityAtPoint(b, contact);
  const relativeVelocity = {
    x: velocityB.x - velocityA.x,
    y: velocityB.y - velocityA.y
  };
  const velocityAlongNormal = dot(relativeVelocity, normal);

  if (velocityAlongNormal > 0) return;

  const radiusACrossNormal = cross(radiusA, normal);
  const radiusBCrossNormal = cross(radiusB, normal);
  const impulseDenominator =
    a.invMass +
    b.invMass +
    radiusACrossNormal * radiusACrossNormal * a.invInertia +
    radiusBCrossNormal * radiusBCrossNormal * b.invInertia;

  if (impulseDenominator <= 0) return;

  const impulseStrength = -(1 + RESTITUTION) * velocityAlongNormal / impulseDenominator;
  const impulse = {
    x: normal.x * impulseStrength,
    y: normal.y * impulseStrength
  };

  applyImpulse(a, { x: -impulse.x, y: -impulse.y }, contact);
  applyImpulse(b, impulse, contact);

  const nextVelocityA = velocityAtPoint(a, contact);
  const nextVelocityB = velocityAtPoint(b, contact);
  const nextRelativeVelocity = {
    x: nextVelocityB.x - nextVelocityA.x,
    y: nextVelocityB.y - nextVelocityA.y
  };
  const tangentVector = {
    x: nextRelativeVelocity.x - normal.x * dot(nextRelativeVelocity, normal),
    y: nextRelativeVelocity.y - normal.y * dot(nextRelativeVelocity, normal)
  };

  if (lengthSq(tangentVector) > 0.000001) {
    const tangent = normalize(tangentVector);
    const radiusACrossTangent = cross(radiusA, tangent);
    const radiusBCrossTangent = cross(radiusB, tangent);
    const tangentDenominator =
      a.invMass +
      b.invMass +
      radiusACrossTangent * radiusACrossTangent * a.invInertia +
      radiusBCrossTangent * radiusBCrossTangent * b.invInertia;
    const tangentStrength = -dot(nextRelativeVelocity, tangent) / Math.max(tangentDenominator, 0.000001);
    const frictionStrength = clamp(tangentStrength, -impulseStrength * FRICTION, impulseStrength * FRICTION);
    const frictionImpulse = {
      x: tangent.x * frictionStrength,
      y: tangent.y * frictionStrength
    };

    applyImpulse(a, { x: -frictionImpulse.x, y: -frictionImpulse.y }, contact);
    applyImpulse(b, frictionImpulse, contact);
  }

  clampBodyMotion(a);
  clampBodyMotion(b);
}

function resolveCollisions() {
  for (let iteration = 0; iteration < COLLISION_ITERATIONS; iteration++) {
    for (let i = 0; i < shapes.length; i++) {
      for (let j = i + 1; j < shapes.length; j++) {
        const collision = detectCollision(shapes[i], shapes[j]);
        if (collision) {
          resolveCollision(shapes[i], shapes[j], collision);
        }
      }
    }
  }
}

const shapes = [];
let isDragging = false;
let dragStart = null;
let dragEnd = null;
let dragStartTime = 0;
const minSize = 5;
const maxSize = 40;
const growthRate = 0.03;

function clampShapeToCanvas(shape) {
  const bounds = getBounds(shape);

  if (bounds.minX < 0) shape.x += -bounds.minX + CONTACT_SLOP;
  if (bounds.maxX > canvas.width) shape.x -= bounds.maxX - canvas.width + CONTACT_SLOP;
  if (bounds.minY < 0) shape.y += -bounds.minY + CONTACT_SLOP;
  if (bounds.maxY > canvas.height) shape.y -= bounds.maxY - canvas.height + CONTACT_SLOP;
}

function transformForResize(obj, oldWidth, oldHeight, newWidth, newHeight, rotationDelta) {
  let x = obj.x;
  let y = obj.y;
  let vx = obj.vx;
  let vy = obj.vy;
  let rotatedWidth = oldWidth;
  let rotatedHeight = oldHeight;

  if (rotationDelta === 90) {
    x = oldHeight - obj.y;
    y = obj.x;
    vx = -obj.vy;
    vy = obj.vx;
    rotatedWidth = oldHeight;
    rotatedHeight = oldWidth;
  } else if (rotationDelta === 180) {
    x = oldWidth - obj.x;
    y = oldHeight - obj.y;
    vx = -obj.vx;
    vy = -obj.vy;
  } else if (rotationDelta === 270) {
    x = obj.y;
    y = oldWidth - obj.x;
    vx = obj.vy;
    vy = -obj.vx;
    rotatedWidth = oldHeight;
    rotatedHeight = oldWidth;
  }

  obj.x = x * (newWidth / rotatedWidth);
  obj.y = y * (newHeight / rotatedHeight);
  obj.vx = vx * (newWidth / rotatedWidth);
  obj.vy = vy * (newHeight / rotatedHeight);

  if (typeof obj.angle === 'number') {
    obj.angle += rotationDelta * Math.PI / 180;
  }
}

function resizeCanvas() {
  const oldWidth = canvas.width;
  const oldHeight = canvas.height;
  const newWidth = window.innerWidth;
  const newHeight = window.innerHeight;
  const newAngle = getScreenAngle();
  const rotationDelta = ((newAngle - lastScreenAngle) % 360 + 360) % 360;

  if (oldWidth === newWidth && oldHeight === newHeight && rotationDelta === 0) return;

  canvas.width = newWidth;
  canvas.height = newHeight;

  for (const shape of shapes) {
    transformForResize(shape, oldWidth, oldHeight, newWidth, newHeight, rotationDelta);
    clampShapeToCanvas(shape);
  }

  isDragging = false;
  dragStart = null;
  dragEnd = null;
  lastScreenAngle = newAngle;

  if (phoneGravityEnabled) {
    markPhoneGravityForCalibration();
  }
}

function clampUnit(value) {
  return Math.max(-1, Math.min(1, value));
}

function rotateVector(x, y, angle) {
  const cos = Math.cos(angle);
  const sin = Math.sin(angle);

  return {
    x: x * cos - y * sin,
    y: x * sin + y * cos
  };
}

function markPhoneGravityForCalibration() {
  phoneGravityNeedsCalibration = true;
}

function calibratePhoneGravity(rawX, rawY) {
  const magnitude = Math.hypot(rawX, rawY);
  if (magnitude < PHONE_GRAVITY_LEVEL_DEADZONE) return false;

  phoneGravityCalibration = Math.PI / 2 - Math.atan2(rawY, rawX);
  phoneGravityNeedsCalibration = false;
  return true;
}

function applyPhoneGravity(rawX, rawY) {
  const rawMagnitude = Math.hypot(rawX, rawY);

  if (rawMagnitude < PHONE_GRAVITY_LEVEL_DEADZONE) {
    phoneGravityX += (0 - phoneGravityX) * PHONE_GRAVITY_SMOOTHING;
    phoneGravityY += (0 - phoneGravityY) * PHONE_GRAVITY_SMOOTHING;
    phoneGravityIsLevel = true;
    lastPhoneGravityEventTime = performance.now();
    motionStatus.textContent = 'Level';
    return;
  }

  if (phoneGravityNeedsCalibration && !calibratePhoneGravity(rawX, rawY)) {
    motionStatus.textContent = 'Waiting';
    return;
  }

  phoneGravityIsLevel = false;
  const rotated = rotateVector(rawX, rawY, phoneGravityCalibration);
  const magnitude = Math.hypot(rotated.x, rotated.y);
  const deadzone = 0.03;
  const limitedMagnitude = magnitude > 1 ? 1 / magnitude : 1;
  const targetX = magnitude < deadzone
    ? 0
    : rotated.x * limitedMagnitude * PHONE_GRAVITY_ACCELERATION;
  const targetY = magnitude < deadzone
    ? 0
    : rotated.y * limitedMagnitude * PHONE_GRAVITY_ACCELERATION;

  phoneGravityX += (targetX - phoneGravityX) * PHONE_GRAVITY_SMOOTHING;
  phoneGravityY += (targetY - phoneGravityY) * PHONE_GRAVITY_SMOOTHING;

  lastPhoneGravityEventTime = performance.now();
  motionStatus.textContent = 'Active';
}

function updateOrientationGravity(event) {
  if (!phoneGravityEnabled || event.beta == null || event.gamma == null) return;
  if (performance.now() - lastMotionGravityTime < 1000) return;

  const beta = Math.max(-90, Math.min(90, event.beta));
  const gamma = Math.max(-90, Math.min(90, event.gamma));
  applyPhoneGravity(
    Math.sin(gamma * Math.PI / 180),
    Math.sin(beta * Math.PI / 180)
  );
}

function updateMotionGravity(event) {
  if (!phoneGravityEnabled || !event.accelerationIncludingGravity) return;

  const gravity = event.accelerationIncludingGravity;
  if (gravity.x == null || gravity.y == null) return;

  lastMotionGravityTime = performance.now();
  applyPhoneGravity(
    clampUnit(gravity.x / SENSOR_GRAVITY),
    clampUnit(-gravity.y / SENSOR_GRAVITY)
  );
}

function attachPhoneGravityListener() {
  if (phoneGravityListenerAttached) return;

  window.addEventListener('deviceorientation', updateOrientationGravity);
  window.addEventListener('devicemotion', updateMotionGravity);
  phoneGravityListenerAttached = true;
}

function watchForPhoneGravityData() {
  clearTimeout(phoneGravityDataTimer);
  lastPhoneGravityEventTime = 0;
  motionStatus.textContent = 'Waiting';
  phoneGravityDataTimer = setTimeout(() => {
    if (phoneGravityEnabled && lastPhoneGravityEventTime === 0) {
      motionStatus.textContent = 'No data';
    }
  }, 1500);
}

function setPhoneGravityEnabled(enabled) {
  phoneGravityEnabled = enabled;
  motionToggle.classList.toggle('active', enabled);
  motionToggle.textContent = enabled ? 'Gravity On' : 'Enable Gravity';
  motionStatus.textContent = enabled ? 'Active' : 'Off';
  gxSlider.disabled = enabled;
  gySlider.disabled = enabled;

  if (!enabled) {
    gxSlider.value = gravityX.toFixed(2);
    gySlider.value = gravityY.toFixed(2);
  } else {
    phoneGravityX = 0;
    phoneGravityY = gravityY;
    phoneGravityIsLevel = false;
    lastMotionGravityTime = 0;
    markPhoneGravityForCalibration();
  }

  if (enabled) {
    attachPhoneGravityListener();
    watchForPhoneGravityData();
  } else {
    clearTimeout(phoneGravityDataTimer);
  }
}

async function requestSensorPermission(EventClass) {
  if (!EventClass || typeof EventClass.requestPermission !== 'function') {
    return EventClass ? 'granted' : 'unsupported';
  }

  return EventClass.requestPermission();
}

motionToggle.addEventListener('click', async () => {
  if (phoneGravityEnabled) {
    setPhoneGravityEnabled(false);
    return;
  }

  if (!hasTiltSensor) {
    motionStatus.textContent = 'Unavailable';
    return;
  }

  if (!isSensorContextAllowed) {
    motionStatus.textContent = 'Needs HTTPS';
    return;
  }

  try {
    const permissions = await Promise.all([
      requestSensorPermission(window.DeviceOrientationEvent),
      requestSensorPermission(window.DeviceMotionEvent)
    ]);

    if (!permissions.some((result) => result === 'granted')) {
      motionStatus.textContent = 'Blocked';
      return;
    }

    setPhoneGravityEnabled(true);
  } catch (error) {
    motionStatus.textContent = 'Blocked';
  }
});

function getCanvasPoint(e) {
  const rect = canvas.getBoundingClientRect();
  return { x: e.clientX - rect.left, y: e.clientY - rect.top };
}

function startDrag(point) {
  dragStart = point;
  dragEnd = { ...dragStart };
  dragStartTime = performance.now();
  isDragging = true;
}

function moveDrag(point) {
  if (isDragging) {
    dragEnd = point;
  }
}

function finishDrag() {
  if (isDragging) {
    const dx = (dragEnd.x - dragStart.x) * 0.1;
    const dy = (dragEnd.y - dragStart.y) * 0.1;
    const holdTime = performance.now() - dragStartTime;
    const size = Math.min(maxSize, minSize + holdTime * growthRate);
    const shape = shapeSelect.value;
    const color = colorPicker.value;
    const newShape = createShape(dragStart.x, dragStart.y, shape, color, size, dx, dy);
    clampShapeToCanvas(newShape);
    shapes.push(newShape);
  }
  isDragging = false;
}

function cancelDrag() {
  isDragging = false;
}

function getTouchPoint(e) {
  const touch = e.changedTouches[0] || e.touches[0];
  if (!touch) return dragEnd || dragStart || { x: 0, y: 0 };
  return getCanvasPoint(touch);
}

if (window.PointerEvent) {
  canvas.addEventListener('pointerdown', (e) => {
    if (e.button !== undefined && e.button !== 0) return;

    e.preventDefault();
    startDrag(getCanvasPoint(e));
    if (canvas.setPointerCapture) {
      canvas.setPointerCapture(e.pointerId);
    }
  });

  canvas.addEventListener('pointermove', (e) => {
    if (isDragging) {
      e.preventDefault();
      moveDrag(getCanvasPoint(e));
    }
  });

  canvas.addEventListener('pointerup', finishDrag);
  canvas.addEventListener('pointercancel', cancelDrag);
  canvas.addEventListener('lostpointercapture', cancelDrag);
} else {
  canvas.addEventListener('mousedown', (e) => {
    if (e.button !== 0) return;

    startDrag(getCanvasPoint(e));
  });

  canvas.addEventListener('mousemove', (e) => {
    moveDrag(getCanvasPoint(e));
  });

  window.addEventListener('mouseup', finishDrag);

  canvas.addEventListener('touchstart', (e) => {
    e.preventDefault();
    startDrag(getTouchPoint(e));
  }, { passive: false });

  canvas.addEventListener('touchmove', (e) => {
    e.preventDefault();
    moveDrag(getTouchPoint(e));
  }, { passive: false });

  canvas.addEventListener('touchend', (e) => {
    e.preventDefault();
    finishDrag();
  }, { passive: false });

  canvas.addEventListener('touchcancel', (e) => {
    e.preventDefault();
    cancelDrag();
  }, { passive: false });
}

window.addEventListener('resize', () => {
  if (phoneGravityEnabled) {
    markPhoneGravityForCalibration();
  }

  resizeCanvas();
});
window.addEventListener('orientationchange', () => {
  if (phoneGravityEnabled) {
    markPhoneGravityForCalibration();
  }

  requestAnimationFrame(resizeCanvas);
});
if (screenOrientation && typeof screenOrientation.addEventListener === 'function') {
  screenOrientation.addEventListener('change', () => {
    if (phoneGravityEnabled) {
      markPhoneGravityForCalibration();
    }

    resizeCanvas();
  });
}

function averageExtremePoint(vertices, key, target) {
  const points = vertices.filter((vertex) => Math.abs(vertex[key] - target) < 0.5);
  return averagePoints(points.length ? points : vertices);
}

function resolveBoundaryCollision(body, normal, penetration, contact) {
  if (penetration <= 0) return;

  const radius = { x: contact.x - body.x, y: contact.y - body.y };
  const contactVelocity = velocityAtPoint(body, contact);
  const velocityAlongNormal = dot(contactVelocity, normal);

  if (velocityAlongNormal < 0) {
    const radiusCrossNormal = cross(radius, normal);
    const impulseDenominator =
      body.invMass +
      radiusCrossNormal * radiusCrossNormal * body.invInertia;

    if (impulseDenominator > 0) {
      const impulseStrength = -(1 + WALL_RESTITUTION) * velocityAlongNormal / impulseDenominator;
      const impulse = {
        x: normal.x * impulseStrength,
        y: normal.y * impulseStrength
      };

      applyImpulse(body, impulse, contact);

      const nextVelocity = velocityAtPoint(body, contact);
      const tangentVector = {
        x: nextVelocity.x - normal.x * dot(nextVelocity, normal),
        y: nextVelocity.y - normal.y * dot(nextVelocity, normal)
      };

      if (lengthSq(tangentVector) > 0.000001) {
        const tangent = normalize(tangentVector);
        const radiusCrossTangent = cross(radius, tangent);
        const tangentDenominator =
          body.invMass +
          radiusCrossTangent * radiusCrossTangent * body.invInertia;
        const tangentStrength = -dot(nextVelocity, tangent) / Math.max(tangentDenominator, 0.000001);
        const frictionStrength = clamp(
          tangentStrength,
          -impulseStrength * WALL_FRICTION,
          impulseStrength * WALL_FRICTION
        );

        applyImpulse(body, {
          x: tangent.x * frictionStrength,
          y: tangent.y * frictionStrength
        }, contact);
      }
    }
  }

  body.x += normal.x * (penetration + CONTACT_SLOP);
  body.y += normal.y * (penetration + CONTACT_SLOP);
  clampBodyMotion(body);
}

function resolveCircleWalls(body) {
  if (body.x - body.size < 0) {
    resolveBoundaryCollision(body, { x: 1, y: 0 }, body.size - body.x, { x: 0, y: body.y });
  }

  if (body.x + body.size > canvas.width) {
    resolveBoundaryCollision(body, { x: -1, y: 0 }, body.x + body.size - canvas.width, {
      x: canvas.width,
      y: body.y
    });
  }

  if (body.y - body.size < 0) {
    resolveBoundaryCollision(body, { x: 0, y: 1 }, body.size - body.y, { x: body.x, y: 0 });
  }

  if (body.y + body.size > canvas.height) {
    resolveBoundaryCollision(body, { x: 0, y: -1 }, body.y + body.size - canvas.height, {
      x: body.x,
      y: canvas.height
    });
  }
}

function resolvePolygonWalls(body) {
  let vertices = getWorldVertices(body);
  let minX = Math.min(...vertices.map((vertex) => vertex.x));
  if (minX < 0) {
    const contact = averageExtremePoint(vertices, 'x', minX);
    contact.x = 0;
    resolveBoundaryCollision(body, { x: 1, y: 0 }, -minX, contact);
  }

  vertices = getWorldVertices(body);
  let maxX = Math.max(...vertices.map((vertex) => vertex.x));
  if (maxX > canvas.width) {
    const contact = averageExtremePoint(vertices, 'x', maxX);
    contact.x = canvas.width;
    resolveBoundaryCollision(body, { x: -1, y: 0 }, maxX - canvas.width, contact);
  }

  vertices = getWorldVertices(body);
  let minY = Math.min(...vertices.map((vertex) => vertex.y));
  if (minY < 0) {
    const contact = averageExtremePoint(vertices, 'y', minY);
    contact.y = 0;
    resolveBoundaryCollision(body, { x: 0, y: 1 }, -minY, contact);
  }

  vertices = getWorldVertices(body);
  let maxY = Math.max(...vertices.map((vertex) => vertex.y));
  if (maxY > canvas.height) {
    const contact = averageExtremePoint(vertices, 'y', maxY);
    contact.y = canvas.height;
    resolveBoundaryCollision(body, { x: 0, y: -1 }, maxY - canvas.height, contact);
  }
}

function resolveWallCollisions(body) {
  if (body.shape === 'circle') {
    resolveCircleWalls(body);
  } else {
    resolvePolygonWalls(body);
  }
}

function stepPhysics(dt) {
  const activeGravityX = phoneGravityEnabled ? phoneGravityX : gravityX;
  const activeGravityY = phoneGravityEnabled ? phoneGravityY : gravityY;
  const levelDamping = Math.pow(0.96, dt);
  const linearDamping = Math.pow(LINEAR_DAMPING, dt);
  const angularDamping = Math.pow(ANGULAR_DAMPING, dt);

  for (const body of shapes) {
    body.vx += activeGravityX * gravityStrength * dt;
    body.vy += activeGravityY * gravityStrength * dt;

    if (phoneGravityEnabled && phoneGravityIsLevel) {
      body.vx *= levelDamping;
      body.vy *= levelDamping;
      body.angularVelocity *= levelDamping;

      if (Math.abs(body.vx) < 0.01) body.vx = 0;
      if (Math.abs(body.vy) < 0.01) body.vy = 0;
      if (Math.abs(body.angularVelocity) < 0.001) body.angularVelocity = 0;
    }

    body.vx *= linearDamping;
    body.vy *= linearDamping;
    body.angularVelocity *= angularDamping;
    clampBodyMotion(body);

    body.x += body.vx * dt;
    body.y += body.vy * dt;
    body.angle += body.angularVelocity * dt;
  }

  for (const body of shapes) {
    resolveWallCollisions(body);
  }

  resolveCollisions();

  for (const body of shapes) {
    resolveWallCollisions(body);
  }
}

function loop() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  for (let i = 0; i < PHYSICS_SUBSTEPS; i++) {
    stepPhysics(1 / PHYSICS_SUBSTEPS);
  }

  for (const shape of shapes) {
    drawShape(shape);
  }

  if (isDragging && dragStart && dragEnd) {
    const holdTime = performance.now() - dragStartTime;
    const size = Math.min(maxSize, minSize + holdTime * growthRate);

    ctx.beginPath();
    ctx.strokeStyle = 'lime';
    ctx.lineWidth = 2;
    ctx.moveTo(dragStart.x, dragStart.y);
    ctx.lineTo(dragEnd.x, dragEnd.y);
    ctx.stroke();

    const angle = Math.atan2(dragEnd.y - dragStart.y, dragEnd.x - dragStart.x);
    const len = 10;
    ctx.beginPath();
    ctx.moveTo(dragEnd.x, dragEnd.y);
    ctx.lineTo(dragEnd.x - len * Math.cos(angle - 0.3), dragEnd.y - len * Math.sin(angle - 0.3));
    ctx.lineTo(dragEnd.x - len * Math.cos(angle + 0.3), dragEnd.y - len * Math.sin(angle + 0.3));
    ctx.closePath();
    ctx.fillStyle = 'lime';
    ctx.fill();

    drawShapeOutline(dragStart.x, dragStart.y, shapeSelect.value, size, 'white');
  }

  requestAnimationFrame(loop);
}

loop();
</script>
