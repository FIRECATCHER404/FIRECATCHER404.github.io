<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Rcrypt Encryptor</title>
  <style>
    :root {
      --bg: #07090d;
      --panel: #111820;
      --panel-2: #0d1319;
      --line: #263848;
      --text: #eef7f4;
      --muted: #93a9a2;
      --green: #4dff88;
      --cyan: #48d5ff;
      --amber: #ffc857;
      --red: #ff6b7a;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
      background:
        linear-gradient(rgba(255, 255, 255, 0.035) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255, 255, 255, 0.035) 1px, transparent 1px),
        var(--bg);
      background-size: 92px 92px, 92px 92px, auto;
      color: var(--text);
    }

    body {
      min-height: 100vh;
    }

    button,
    input,
    select,
    textarea {
      color: inherit;
      font: inherit;
    }

    .shell {
      width: min(1180px, calc(100% - 28px));
      margin: 0 auto;
      padding: 18px 0 28px;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      min-height: 58px;
      margin-bottom: 16px;
      border-bottom: 1px solid var(--line);
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      min-width: 0;
    }

    .mark {
      width: 38px;
      height: 38px;
      border: 1px solid rgba(77, 255, 136, 0.55);
      border-radius: 8px;
      display: grid;
      place-items: center;
      color: var(--green);
      background: #0b1117;
      font-family: "Cascadia Code", Consolas, monospace;
      font-weight: 700;
    }

    h1 {
      margin: 0;
      font-size: clamp(1.25rem, 3vw, 1.85rem);
      line-height: 1.1;
      letter-spacing: 0;
    }

    .sub {
      color: var(--muted);
      font-size: 0.86rem;
      margin-top: 3px;
    }

    .topbar a,
    button {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #121b24;
      min-height: 36px;
      padding: 8px 12px;
      text-decoration: none;
      cursor: pointer;
    }

    .topbar a:hover,
    button:hover {
      border-color: rgba(72, 213, 255, 0.65);
      background: #162432;
    }

    .tool {
      display: grid;
      grid-template-columns: 280px minmax(0, 1fr);
      gap: 14px;
      align-items: start;
    }

    .controls,
    .workspace {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(17, 24, 32, 0.94);
      box-shadow: 0 18px 44px rgba(0, 0, 0, 0.28);
    }

    .controls {
      padding: 14px;
      display: grid;
      gap: 13px;
      position: sticky;
      top: 14px;
    }

    .workspace {
      overflow: hidden;
    }

    .row {
      display: grid;
      gap: 7px;
    }

    label,
    .label {
      color: var(--muted);
      font-size: 0.78rem;
    }

    select,
    input,
    textarea {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #091017;
      outline: none;
    }

    select,
    input {
      min-height: 38px;
      padding: 8px 10px;
    }

    select:focus,
    input:focus,
    textarea:focus {
      border-color: var(--cyan);
      box-shadow: 0 0 0 3px rgba(72, 213, 255, 0.13);
    }

    .seg {
      display: grid;
      grid-template-columns: 1fr 1fr;
      border: 1px solid var(--line);
      border-radius: 8px;
      overflow: hidden;
      background: #091017;
    }

    .seg button {
      border: 0;
      border-radius: 0;
      background: transparent;
      min-height: 38px;
    }

    .seg button.active {
      color: #05100a;
      background: var(--green);
      font-weight: 700;
    }

    .primary {
      border-color: rgba(77, 255, 136, 0.65);
      background: rgba(77, 255, 136, 0.16);
      color: var(--green);
      font-weight: 700;
    }

    .actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .primary {
      grid-column: 1 / -1;
    }

    .io {
      display: grid;
      grid-template-columns: minmax(0, 1fr) minmax(0, 1fr);
      min-height: 560px;
    }

    .pane {
      min-width: 0;
      display: grid;
      grid-template-rows: auto minmax(320px, 1fr);
      border-right: 1px solid var(--line);
    }

    .pane:last-child {
      border-right: 0;
    }

    .pane-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      min-height: 46px;
      padding: 9px 11px;
      background: var(--panel-2);
      border-bottom: 1px solid var(--line);
    }

    .pane-head strong {
      font-size: 0.92rem;
    }

    .mini-actions {
      display: flex;
      gap: 7px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .mini-actions button {
      min-height: 30px;
      padding: 5px 8px;
      font-size: 0.78rem;
    }

    textarea {
      resize: none;
      min-height: 100%;
      border: 0;
      border-radius: 0;
      padding: 12px;
      background: #070c11;
      font-family: "Cascadia Code", Consolas, monospace;
      font-size: 13px;
      line-height: 1.45;
      overflow: auto;
    }

    #output {
      color: #dfffea;
    }

    .status {
      min-height: 38px;
      padding: 10px 12px;
      border-top: 1px solid var(--line);
      color: var(--muted);
      font-family: "Cascadia Code", Consolas, monospace;
      font-size: 0.82rem;
      background: #0b1117;
    }

    .status.good {
      color: var(--green);
    }

    .status.bad {
      color: var(--red);
    }

    .meter {
      height: 6px;
      border-radius: 999px;
      overflow: hidden;
      background: #071017;
      border: 1px solid var(--line);
    }

    .meter span {
      display: block;
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, var(--red), var(--amber), var(--green));
      transition: width 0.15s ease;
    }

    @media (max-width: 860px) {
      .tool,
      .io {
        grid-template-columns: 1fr;
      }

      .controls {
        position: static;
      }

      .pane {
        border-right: 0;
        border-bottom: 1px solid var(--line);
      }

      .pane:last-child {
        border-bottom: 0;
      }

      .io {
        min-height: auto;
      }
    }
  </style>
<script src="/analytics.js"></script>
</head>
<body>
  <div class="shell">
    <header class="topbar">
      <div class="brand">
        <div class="mark" aria-hidden="true">RC</div>
        <div>
          <h1>Rcrypt Encryptor</h1>
          <div class="sub">password encryptor / decryptor</div>
        </div>
      </div>
      <a href="index.html">Projects</a>
    </header>

    <main class="tool">
      <section class="controls" aria-label="Rcrypt controls">
        <div class="row">
          <div class="label">Mode</div>
          <div class="seg" role="group" aria-label="Mode">
            <button id="encryptMode" class="active" type="button">Encrypt</button>
            <button id="decryptMode" type="button">Decrypt</button>
          </div>
        </div>

        <div class="row">
          <label for="payloadType">Type</label>
          <select id="payloadType">
            <option value="text">Text</option>
            <option value="int">Integer</option>
            <option value="bytes">Bytes as hex</option>
          </select>
        </div>

        <div class="row">
          <label for="format">Encrypted format</label>
          <select id="format">
            <option value="hex">Hexadecimal</option>
            <option value="bin">Binary</option>
            <option value="ternary">Ternary</option>
            <option value="ascii">Raw ASCII</option>
          </select>
        </div>

        <div class="row">
          <label for="password">Password</label>
          <input id="password" type="password" autocomplete="new-password" />
          <div class="meter" aria-hidden="true"><span id="meterFill"></span></div>
        </div>

        <div class="actions">
          <button id="runBtn" class="primary" type="button">Run</button>
          <button id="swapBtn" type="button">Swap</button>
          <button id="clearBtn" type="button">Clear</button>
        </div>
      </section>

      <section class="workspace" aria-label="Rcrypt workspace">
        <div class="io">
          <div class="pane">
            <div class="pane-head">
              <strong id="inputTitle">Plain input</strong>
              <div class="mini-actions">
                <button id="pasteBtn" type="button">Paste</button>
              </div>
            </div>
            <textarea id="input" spellcheck="false" placeholder="Type text to encrypt"></textarea>
          </div>

          <div class="pane">
            <div class="pane-head">
              <strong id="outputTitle">Encrypted output</strong>
              <div class="mini-actions">
                <button id="copyBtn" type="button">Copy</button>
                <button id="downloadBtn" type="button">Download</button>
              </div>
            </div>
            <textarea id="output" spellcheck="false" readonly></textarea>
          </div>
        </div>
        <div id="status" class="status">Ready.</div>
      </section>
    </main>
  </div>

  <script type="module">
    import {
      assertSupported,
      bytesToHex,
      decryptBytes,
      decryptInteger,
      decryptText,
      encryptBytes,
      encryptInteger,
      encryptText,
      hexToBytes
    } from "./rcrypt-core.js";

    const encryptMode = document.getElementById("encryptMode");
    const decryptMode = document.getElementById("decryptMode");
    const payloadType = document.getElementById("payloadType");
    const format = document.getElementById("format");
    const password = document.getElementById("password");
    const input = document.getElementById("input");
    const output = document.getElementById("output");
    const status = document.getElementById("status");
    const inputTitle = document.getElementById("inputTitle");
    const outputTitle = document.getElementById("outputTitle");
    const meterFill = document.getElementById("meterFill");
    const runBtn = document.getElementById("runBtn");
    const swapBtn = document.getElementById("swapBtn");
    const clearBtn = document.getElementById("clearBtn");
    const copyBtn = document.getElementById("copyBtn");
    const pasteBtn = document.getElementById("pasteBtn");
    const downloadBtn = document.getElementById("downloadBtn");

    let mode = "encrypt";

    function setMode(nextMode) {
      mode = nextMode;
      encryptMode.classList.toggle("active", mode === "encrypt");
      decryptMode.classList.toggle("active", mode === "decrypt");
      runBtn.textContent = mode === "encrypt" ? "Encrypt" : "Decrypt";
      inputTitle.textContent = mode === "encrypt" ? "Plain input" : "Encrypted input";
      outputTitle.textContent = mode === "encrypt" ? "Encrypted output" : "Plain output";
      updatePlaceholder();
    }

    function setStatus(message, kind = "") {
      status.textContent = message;
      status.className = `status ${kind}`.trim();
    }

    function updatePlaceholder() {
      const type = payloadType.value;
      if (mode === "decrypt") {
        input.placeholder = `Paste ${format.value} encrypted input`;
      } else if (type === "int") {
        input.placeholder = "Type an integer, including very large or negative values";
      } else if (type === "bytes") {
        input.placeholder = "Type bytes as hex, for example: 48656c6c6f";
      } else {
        input.placeholder = "Type text to encrypt";
      }
    }

    function updatePasswordMeter() {
      const value = password.value;
      let score = 0;
      if (value.length >= 8) score += 25;
      if (value.length >= 14) score += 25;
      if (/[a-z]/.test(value) && /[A-Z]/.test(value)) score += 20;
      if (/\d/.test(value)) score += 15;
      if (/[^A-Za-z0-9]/.test(value)) score += 15;
      meterFill.style.width = `${Math.min(score, 100)}%`;
    }

    async function run() {
      runBtn.disabled = true;
      setStatus(mode === "encrypt" ? "Encrypting..." : "Decrypting...");

      try {
        const type = payloadType.value;
        const selectedFormat = format.value;
        const secret = password.value;
        const value = input.value;
        let result;

        if (mode === "encrypt") {
          if (type === "text") result = await encryptText(value, secret, selectedFormat);
          if (type === "int") result = await encryptInteger(value, secret, selectedFormat);
          if (type === "bytes") result = await encryptBytes(hexToBytes(value), secret, selectedFormat);
        } else {
          if (type === "text") result = await decryptText(value, secret, selectedFormat);
          if (type === "int") result = await decryptInteger(value, secret, selectedFormat);
          if (type === "bytes") result = bytesToHex(await decryptBytes(value, secret, selectedFormat));
        }

        output.value = result;
        setStatus("Done.", "good");
      } catch (error) {
        setStatus(error.message || String(error), "bad");
      } finally {
        runBtn.disabled = false;
      }
    }

    async function copyOutput() {
      await navigator.clipboard.writeText(output.value);
      setStatus("Copied.", "good");
    }

    async function pasteInput() {
      input.value = await navigator.clipboard.readText();
      setStatus("Pasted.", "good");
    }

    function downloadOutput() {
      const blob = new Blob([output.value], { type: "text/plain;charset=utf-8" });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = mode === "encrypt" ? `rcrypt.${format.value}.txt` : "rcrypt-output.txt";
      a.click();
      URL.revokeObjectURL(url);
    }

    encryptMode.addEventListener("click", () => setMode("encrypt"));
    decryptMode.addEventListener("click", () => setMode("decrypt"));
    payloadType.addEventListener("change", updatePlaceholder);
    format.addEventListener("change", updatePlaceholder);
    password.addEventListener("input", updatePasswordMeter);
    runBtn.addEventListener("click", run);
    copyBtn.addEventListener("click", copyOutput);
    pasteBtn.addEventListener("click", pasteInput);
    downloadBtn.addEventListener("click", downloadOutput);
    clearBtn.addEventListener("click", () => {
      input.value = "";
      output.value = "";
      setStatus("Ready.");
    });
    swapBtn.addEventListener("click", () => {
      input.value = output.value;
      output.value = "";
      setMode(mode === "encrypt" ? "decrypt" : "encrypt");
      setStatus("Swapped.");
    });

    try {
      assertSupported();
      updatePlaceholder();
      updatePasswordMeter();
    } catch (error) {
      setStatus(error.message || String(error), "bad");
      runBtn.disabled = true;
    }
  </script>
</body>
</html>
