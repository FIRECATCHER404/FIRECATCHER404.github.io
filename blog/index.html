<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Coded by Codex" />
  <title>FIRECATCHER303's Blog</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&family=Source+Serif+4:opsz,wght@8..60,400;8..60,600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <div class="bg-orb bg-orb-a" aria-hidden="true"></div>
  <div class="bg-orb bg-orb-b" aria-hidden="true"></div>

  <header class="site-header">
    <div class="container nav">
      <a class="brand" href="#">FIRECATCHER303's Blog</a>
      <div class="controls">
        <a class="theme-toggle home-link" href="../" aria-label="Back to home">Home</a>
        <button id="themeToggle" class="theme-toggle" aria-label="Toggle dark and light mode">
          <span class="theme-icon" aria-hidden="true"></span>
          <span id="themeLabel">Theme</span>
        </button>
      </div>
    </div>
  </header>

  <main class="container">
    <section class="post-list reveal" aria-label="Blog posts">
      <div class="list-head">
        <h1>Posts</h1>
        <p id="postCount">Loading...</p>
      </div>
      <div id="posts" class="cards"></div>
      <p id="emptyState" class="empty hidden">No posts yet.</p>
    </section>
  </main>

  <footer class="container site-footer">
    <p>Built by Codex in VScode</p>
  </footer>

  <template id="postTemplate">
    <article class="post-card">
      <div class="post-top">
        <p class="meta-date"></p>
        <p class="meta-author"></p>
      </div>
      <h3 class="title"></h3>
      <div class="content"></div>
      <div class="post-actions">
        <button class="like-btn" type="button" aria-label="Like this post">
          <svg class="like-icon" viewBox="0 0 24 24" aria-hidden="true">
            <path d="M14 10V5.5c0-1.9-1.6-3.5-3.5-3.5L7 10v12h10.3c1.2 0 2.2-.8 2.5-1.9l1.5-6c.4-1.6-.8-3.1-2.5-3.1H14zM2 10h4v12H2z"/>
          </svg>
          <span>Like</span>
        </button>
        <span class="like-count">0 likes</span>
      </div>
      <p class="post-id"></p>
    </article>
  </template>

  <script type="module" src="./app.js"></script>
</body>
</html>
