<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Coded by Codex" />
  <title>FIRECATCHER303's Blog</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&family=Source+Serif+4:opsz,wght@8..60,400;8..60,600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <div class="bg-orb bg-orb-a" aria-hidden="true"></div>
  <div class="bg-orb bg-orb-b" aria-hidden="true"></div>

  <header class="site-header">
    <div class="container nav">
      <a class="brand" href="#">FIRECATCHER303's Blog</a>
      <div class="controls">
        <a class="theme-toggle home-link" href="../" aria-label="Back to home">Home</a>
        <button id="themeToggle" class="theme-toggle" aria-label="Toggle dark and light mode">
          <span class="theme-icon" aria-hidden="true"></span>
          <span id="themeLabel">Theme</span>
        </button>
      </div>
    </div>
  </header>

  <main class="container">
    <section class="post-list reveal" aria-label="Blog posts">
      <div class="list-head">
        <h1>Posts</h1>
        <p id="postCount">Loading...</p>
      </div>
      <div class="list-tools">
        <div class="search-wrap">
          <label class="sr-only" for="searchInput">Search posts</label>
          <input id="searchInput" type="search" placeholder="Search title or content..." autocomplete="off" />
          <button id="searchClear" type="button" class="post-link-btn">Clear</button>
        </div>
        <p id="searchStatus" class="search-status hidden" aria-live="polite"></p>
      </div>
      <section id="commentAuth" class="comment-auth" aria-label="Comment account">
        <div class="comment-auth-head">
          <h2>Comment Account</h2>
          <p id="authStateText">Sign in to comment.</p>
        </div>
        <form id="authForm" class="comment-auth-form">
          <input id="authUsername" type="text" placeholder="Username (sign up)" maxlength="32" />
          <input id="authEmail" type="email" placeholder="Email" autocomplete="email" required />
          <input id="authPassword" type="password" placeholder="Password" autocomplete="current-password" minlength="8" required />
          <div class="comment-auth-actions">
            <button id="authSignIn" type="submit" class="post-link-btn">Sign in</button>
            <button id="authSignUp" type="button" class="post-link-btn">Sign up</button>
            <button id="authSignOut" type="button" class="post-link-btn hidden">Sign out</button>
          </div>
        </form>
        <p id="authStatus" class="auth-status" aria-live="polite"></p>
      </section>
      <div id="posts" class="cards"></div>
      <p id="emptyState" class="empty hidden">No posts yet.</p>
    </section>
  </main>

  <footer class="container site-footer">
    <p>Built by Codex in VScode</p>
  </footer>

  <template id="postTemplate">
    <article class="post-card">
      <div class="post-top">
        <p class="meta-date"></p>
        <p class="meta-author"></p>
      </div>
      <h3 class="title"></h3>
      <div class="content"></div>
      <div class="post-actions">
        <button class="like-btn" type="button" aria-label="Like this post">
          <svg class="like-icon" viewBox="0 0 24 24" aria-hidden="true">
            <path d="M14 10V5.5c0-1.9-1.6-3.5-3.5-3.5L7 10v12h10.3c1.2 0 2.2-.8 2.5-1.9l1.5-6c.4-1.6-.8-3.1-2.5-3.1H14zM2 10h4v12H2z"/>
          </svg>
          <span>Like</span>
        </button>
        <span class="like-count">0 likes</span>
      </div>
      <section class="comments">
        <h4>Comments</h4>
        <p class="comment-empty">No comments yet.</p>
        <div class="comment-list"></div>
        <form class="comment-form">
          <input class="comment-name" type="text" maxlength="32" placeholder="Display name" required />
          <textarea class="comment-text" rows="3" maxlength="1000" placeholder="Write a comment..." required></textarea>
          <div class="comment-actions">
            <button type="submit" class="post-link-btn">Post comment</button>
          </div>
          <p class="comment-status" aria-live="polite"></p>
        </form>
      </section>
      <p class="post-id"></p>
    </article>
  </template>

  <script type="module" src="./app.js"></script>
</body>
</html>
